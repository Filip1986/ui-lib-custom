name: Accessibility Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  a11y-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build library
        run: npm run build

      - name: Run accessibility tests
        run: npm run test:a11y -- --ci --coverage

      - name: Upload coverage report
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/a11y/lcov.info
          flags: accessibility
          name: a11y-coverage

      - name: Comment on PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = 'test-results/a11y-report.md';
            if (!fs.existsSync(path)) {
              core.warning('No a11y report found to comment.');
              return;
            }
            const body = fs.readFileSync(path, 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  # Full Playwright e2e a11y suite (a11y, a11y-full-sweep, a11y-interactions,
  # overlay-mounting). Previously disabled via `if: false`; re-enabled now that all
  # suites pass (74 tests) and the playwright config has retries:2 in CI. This is the
  # gate that caught the modal-dialog NG0203 render bug — keep it running.
  e2e-a11y-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build library and demo
        run: |
          npm run build
          npm run build:demo

      # Gating suites — all green. a11y.spec covers labelled scenarios;
      # a11y-interactions exercises open-state keyboard + axe per widget (guards the
      # modal-dialog NG0203 regression); a11y-full-sweep runs axe on every demo route
      # (the violations it surfaced are now fixed at the component/demo level).
      - name: Run E2E accessibility tests (gating)
        run: npx playwright test e2e/a11y.spec.ts e2e/a11y-interactions.spec.ts e2e/a11y-full-sweep.spec.ts

      # Non-blocking — overlay-mounting's panel-clipping assertions depend on headless
      # layout and can be flaky on the CI runner. Kept running for visibility (artifact
      # uploaded below) but not yet gating.
      - name: Run overlay-mounting checks (non-blocking)
        continue-on-error: true
        run: npx playwright test e2e/overlay-mounting.spec.ts

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-a11y-report
          path: playwright-report/
          retention-days: 30
