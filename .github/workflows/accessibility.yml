name: Accessibility Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  a11y-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build library
        run: npm run build

      - name: Run accessibility tests
        run: npm run test:a11y -- --ci --coverage

      - name: Upload coverage report
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/a11y/lcov.info
          flags: accessibility
          name: a11y-coverage

      - name: Comment on PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = 'test-results/a11y-report.md';
            if (!fs.existsSync(path)) {
              core.warning('No a11y report found to comment.');
              return;
            }
            const body = fs.readFileSync(path, 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  # Full Playwright e2e a11y suite (a11y, a11y-full-sweep, a11y-interactions,
  # overlay-mounting). Previously disabled via `if: false`; re-enabled now that all
  # suites pass (74 tests) and the playwright config has retries:2 in CI. This is the
  # gate that caught the modal-dialog NG0203 render bug — keep it running.
  e2e-a11y-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build library and demo
        run: |
          npm run build
          npm run build:demo

      - name: Run E2E accessibility tests
        # Runs the full e2e suite: a11y.spec, a11y-full-sweep (every route at rest),
        # a11y-interactions (open-state keyboard + axe per widget), and overlay-mounting.
        # Previously only a11y.spec.ts was gated, so the interaction suite could rot.
        run: npx playwright test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-a11y-report
          path: playwright-report/
          retention-days: 30
