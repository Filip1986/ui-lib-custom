name: Accessibility Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  a11y-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build library
        run: npm run build

      - name: Run accessibility tests
        run: npm run test:a11y -- --ci --coverage

      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/a11y/lcov.info
          flags: accessibility
          name: a11y-coverage

      - name: Comment on PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = 'test-results/a11y-report.md';
            if (!fs.existsSync(path)) {
              core.warning('No a11y report found to comment.');
              return;
            }
            const body = fs.readFileSync(path, 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  # NOTE: e2e a11y tests are disabled in CI until the library reaches a stable state.
  # Re-enable by removing the `if: false` condition below.
  e2e-a11y-tests:
    if: false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build library and demo
        run: |
          npm run build
          npm run build:demo

      - name: Run E2E accessibility tests
        run: npx playwright test e2e/a11y.spec.ts

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-a11y-report
          path: playwright-report/
          retention-days: 30
