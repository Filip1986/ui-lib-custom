name: Dependabot Auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge patch and minor updates
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge patch and minor updates
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: |
          set +e
          merge_output=$(gh pr merge --auto --squash "$PR_URL" 2>&1)
          merge_status=$?
          echo "$merge_output"

          if [ $merge_status -ne 0 ] && [[ "$merge_output" == *"Auto merge is not allowed for this repository"* ]]; then
            echo "Auto-merge is disabled for this repository. Skipping without failing the workflow."
            exit 0
          fi

          exit $merge_status
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
