name: CI

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Build library
        run: npm run build
      - name: Bundle size check
        run: npm run bundlesize
      - name: Per-entry-point gzip budget check
        run: npm run bundlesize:check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Unit tests (with coverage gate)
        run: npm run test:coverage

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Lint
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Type check
        run: npm run typecheck

  storybook-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Install Storybook Angular build deps
        run: |
          # Storybook Angular expects @angular-devkit/build-angular and it must match @angular/build.
          ANGULAR_BUILD_VERSION=$(node -p "require('./node_modules/@angular/build/package.json').version")
          npm install --legacy-peer-deps --no-save @compodoc/compodoc @angular-devkit/build-angular@$ANGULAR_BUILD_VERSION
      - name: Build Storybook
        run: npm run build-storybook
