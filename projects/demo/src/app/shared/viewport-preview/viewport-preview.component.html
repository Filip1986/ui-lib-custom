@if (showToolbar && (mode === 'inline' || activeSignal())) {
  <div class="viewport-toolbar">
    <div class="preset-buttons">
      @for (preset of presets; track preset.key) {
        <button (click)="setPreset(preset)">{{ preset.label }}</button>
      }
      <div class="custom">
        <label>Custom</label>
        <input
          max="2000"
          min="200"
          type="number"
          [ngModel]="customWidth()"
          (ngModelChange)="customWidth.set($event)"
        />
        <button (click)="setCustom()">Apply</button>
      </div>
    </div>
    <div class="controls">
      <span class="dims">{{ displayWidth() }} × {{ displayHeight() }}px</span>
      <button (click)="rotate()">Rotate</button>
      @if (mode === 'floating') {
        <button (click)="toggleActive()">Close</button>
      }
    </div>
  </div>
}

<div
  #frameHost
  class="viewport-frame"
  [style.height]="autoHeight || isFullWidth() ? 'auto' : displayHeight() + 'px'"
  [style.transform]="autoHeight ? 'none' : 'scale(' + scale() + ')'"
  [style.width]="autoHeight || isFullWidth() ? '100%' : displayWidth() + 'px'"
>
  <ng-content />
</div>

@if (mode === 'floating' && !activeSignal()) {
  <div class="viewport-launcher" title="Open viewport preview" (click)="toggleActive()">
    <i class="pi pi-desktop"></i>
  </div>
}
