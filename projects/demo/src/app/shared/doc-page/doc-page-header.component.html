<div class="doc-header">
  <h1>{{ title() }}</h1>
  @if (description()) {
    <p class="doc-description">{{ description() }}</p>
  }
  @if (importCode()) {
    <ui-lib-code-snippet
      language="typescript"
      [showLineNumbers]="false"
      size="sm"
      [code]="importCode()"
    />
  }
  <ng-content />
  <ui-lib-divider [decorative]="true" />
</div>
