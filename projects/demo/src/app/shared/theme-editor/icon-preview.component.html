<div class="icon-preview">
  <div class="preview-header">
    <h4>Icon Library Comparison</h4>
    <select aria-label="Icon preview selection" (change)="onIconSelect($event)">
      @for (icon of semanticIcons; track icon) {
        <option [selected]="icon === selectedIcon()" [value]="icon">{{ icon }}</option>
      }
    </select>
  </div>

  <div class="preview-grid">
    @for (lib of libraries; track lib) {
      <div class="library-preview">
        <span class="library-name">{{ lib }}</span>
        <ui-lib-icon size="xl" [library]="lib" [name]="selectedIcon()" />
      </div>
    }
  </div>
</div>
