<ui-lib-order-list [value]="products" [(selection)]="selection">
  <ng-template uiOrderListItem let-item>
    <div class="demo-ol-row">
      <span class="demo-ol-name">{{ item.name }}</span>
      <span class="demo-ol-price">{{ formatPrice(item.price) }}</span>
    </div>
  </ng-template>
</ui-lib-order-list>
