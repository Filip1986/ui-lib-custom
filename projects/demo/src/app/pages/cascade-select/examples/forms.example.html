<form #f="ngForm">
  <ui-lib-cascade-select
    #cityModel="ngModel"
    name="city"
    optionGroupLabel="name"
    optionLabel="cname"
    optionValue="code"
    required
    [invalid]="cityModel.invalid && cityModel.touched"
    [optionGroupChildren]="['states', 'cities']"
    [options]="countries"
    [(ngModel)]="templateDrivenCode"
  />
</form>
