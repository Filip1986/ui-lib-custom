<form [formGroup]="reactiveForm">
  <ui-lib-cascade-select
    formControlName="city"
    [invalid]="cityControl().invalid && cityControl().touched"
    [options]="countries"
    optionGroupLabel="name"
    [optionGroupChildren]="['states', 'cities']"
    optionLabel="cname"
    optionValue="code"
  />
</form>
