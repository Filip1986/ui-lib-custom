<app-doc-page-layout [sections]="sections">
  <app-doc-page-header
    docHeader
    title="Layout Primitives"
    description="Performance-first layout components using signals, OnPush change detection, and design tokens. Each component renders a single element with zero runtime overhead."
  />

    <app-layout-basic-example />
  <ui-lib-code-snippet language="html" [code]="layoutExample" 
    [showLineNumbers]="true"
    />

  <div class="viewport-control-stack">
    <ui-lib-panel variant="minimal">
      <div class="viewport-controls">
        <div class="preset-buttons">
          @for (preset of viewportPresets; track preset.key) {
            <ui-lib-button size="sm" appearance="ghost" (click)="setViewportPreset(preset)">{{
              preset.label
            }}</ui-lib-button>
          }
          <div class="custom">
            <label>Custom</label>
            <input
              type="number"
              min="200"
              max="2000"
              [ngModel]="viewportCustomWidth()"
              (ngModelChange)="setViewportCustomWidth($event)"
            />
            <ui-lib-button size="sm" appearance="ghost" (click)="applyViewportCustom()"
              >Apply</ui-lib-button
            >
          </div>
        </div>
        <div class="controls">
          <span class="dims">{{ viewportDisplayWidth() }} × {{ viewportDisplayHeight() }}px</span>
          <ui-lib-button size="sm" appearance="ghost" (click)="rotateViewport()"
            >Rotate</ui-lib-button
          >
        </div>
      </div>
    </ui-lib-panel>

    <ui-lib-panel variant="minimal">
      <div class="density-controls">
        <ui-lib-button
          size="sm"
          appearance="ghost"
          (click)="setViewportDensity('default')"
          [class.active]="viewportDensity() === 'default'"
          >Default</ui-lib-button
        >
        <ui-lib-button
          size="sm"
          appearance="ghost"
          (click)="setViewportDensity('comfortable')"
          [class.active]="viewportDensity() === 'comfortable'"
          >Comfortable</ui-lib-button
        >
        <ui-lib-button
          size="sm"
          appearance="ghost"
          (click)="setViewportDensity('compact')"
          [class.active]="viewportDensity() === 'compact'"
          >Compact</ui-lib-button
        >
      </div>
    </ui-lib-panel>
  </div>

  <app-layout-semantic-spacing-section />
  <app-layout-stack-section />
  <app-layout-inline-section />
  <app-layout-grid-section />
  <app-layout-container-section />
  <app-layout-composition-section />
  <app-layout-design-tokens-section />
  <app-layout-themed-layouts-section />
  <app-layout-examples-section />

  <div class="demo-page-rail" docRail>
    <p class="demo-page-rail__title">On this page</p>
    <app-doc-toc
      [sections]="sections"
      [activeId]="layout()?.activeSectionId() ?? null"
      (sectionSelected)="scrollTo($event)"
    />
  </div>

</app-doc-page-layout>
