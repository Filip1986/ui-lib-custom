<form [formGroup]="reactiveForm" (ngSubmit)="submitReactive()">
  <ui-lib-float-label>
    <input placeholder=" " formControlName="firstName" />
    <label>First name</label>
  </ui-lib-float-label>
  <ui-lib-float-label>
    <ui-lib-select [options]="cityOptions" formControlName="city" />
    <label>City</label>
  </ui-lib-float-label>
  <ui-lib-float-label variant="in">
    <textarea placeholder=" " formControlName="bio"></textarea>
    <label>Bio</label>
  </ui-lib-float-label>
</form>
