<form [formGroup]="reactiveForm" (ngSubmit)="submitReactive()">
  <ui-lib-float-label>
    <input formControlName="firstName" placeholder=" " />
    <label>First name</label>
  </ui-lib-float-label>
  <ui-lib-float-label>
    <ui-lib-select formControlName="city" [options]="cityOptions" />
    <label>City</label>
  </ui-lib-float-label>
  <ui-lib-float-label variant="in">
    <textarea formControlName="bio" placeholder=" "></textarea>
    <label>Bio</label>
  </ui-lib-float-label>
</form>
