<app-doc-page-layout [sections]="sections">

  <app-doc-page-header
    docHeader
    title="Splitter"
    [importCode]="importCode"
    description="Coming soon — the Splitter component is under active development."
  />


  <!-- ── API Reference ──────────────────────────────────────────────────── -->
  <section class="demo-section" id="api" data-doc-anchor>
    <h2 class="demo-section__title">API Reference</h2>
    <p class="demo-section__description">
      All inputs accepted by <code>ui-lib-splitter</code>. Import from
      <code>ui-lib-custom/splitter</code>.
    </p>
    <app-doc-api-reference [rows]="apiRows" />
  </section>
  <div class="demo-page-rail" docRail>
    <p class="demo-page-rail__title">On this page</p>
    <app-doc-toc
      [sections]="sections"
      [activeId]="layout()?.activeSectionId() ?? null"
      (sectionSelected)="scrollTo($event)"
    />
  </div>

</app-doc-page-layout>
