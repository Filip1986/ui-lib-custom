<div class="topbar">
  <div class="topbar-left">
    <button aria-label="Toggle sidebar" class="menu-button" (click)="onMenuButtonClick()">
      <i class="pi pi-bars"></i>
    </button>
    <a class="logo" routerLink="/">
      <i class="pi pi-box"></i>
      <span class="logo-text">UI Components</span>
    </a>
  </div>

  <div class="topbar-right">
    <div class="topbar-select">
      <select
        aria-label="Select saved theme"
        [value]="''"
        (change)="onLoadTheme($any($event.target).value)"
      >
        <option disabled value="">Select saved theme</option>
        @for (themeName of savedThemes(); track themeName) {
          <option [value]="themeName">{{ themeName }}</option>
        }
      </select>
    </div>

    <div aria-live="polite" class="theme-indicator">
      <span class="theme-name">{{ themeName() }}</span>
      <span class="theme-variant">{{ themeVariant() }}</span>
    </div>

    <div aria-label="Component variant" class="variant-switcher" role="group">
      <ui-lib-button
        appearance="ghost"
        size="sm"
        [attr.aria-pressed]="variant() === 'material'"
        [class.active]="variant() === 'material'"
        (click)="setVariant('material')"
      >
        Material
      </ui-lib-button>
      <ui-lib-button
        appearance="ghost"
        size="sm"
        [attr.aria-pressed]="variant() === 'bootstrap'"
        [class.active]="variant() === 'bootstrap'"
        (click)="setVariant('bootstrap')"
      >
        Bootstrap
      </ui-lib-button>
      <ui-lib-button
        appearance="ghost"
        size="sm"
        [attr.aria-pressed]="variant() === 'minimal'"
        [class.active]="variant() === 'minimal'"
        (click)="setVariant('minimal')"
      >
        Minimal
      </ui-lib-button>
    </div>

    <div aria-label="Component shape" class="shape-switcher" role="group">
      <ui-lib-button
        appearance="ghost"
        size="sm"
        [attr.aria-pressed]="shape() === 'sharp'"
        [class.active]="shape() === 'sharp'"
        (click)="setShape('sharp')"
      >
        Sharp
      </ui-lib-button>
      <ui-lib-button
        appearance="ghost"
        size="sm"
        [attr.aria-pressed]="shape() === 'rounded'"
        [class.active]="shape() === 'rounded'"
        (click)="setShape('rounded')"
      >
        Rounded
      </ui-lib-button>
      <ui-lib-button
        appearance="ghost"
        size="sm"
        [attr.aria-pressed]="shape() === 'soft'"
        [class.active]="shape() === 'soft'"
        (click)="setShape('soft')"
      >
        Soft
      </ui-lib-button>
      <ui-lib-button
        appearance="ghost"
        size="sm"
        [attr.aria-pressed]="shape() === 'pill'"
        [class.active]="shape() === 'pill'"
        (click)="setShape('pill')"
      >
        Pill
      </ui-lib-button>
    </div>

    <div aria-label="Component density" class="density-switcher" role="group">
      <ui-lib-button
        appearance="ghost"
        size="sm"
        [attr.aria-pressed]="density() === 'compact'"
        [class.active]="density() === 'compact'"
        (click)="setDensity('compact')"
      >
        Compact
      </ui-lib-button>
      <ui-lib-button
        appearance="ghost"
        size="sm"
        [attr.aria-pressed]="density() === 'default'"
        [class.active]="density() === 'default'"
        (click)="setDensity('default')"
      >
        Default
      </ui-lib-button>
      <ui-lib-button
        appearance="ghost"
        size="sm"
        [attr.aria-pressed]="density() === 'comfortable'"
        [class.active]="density() === 'comfortable'"
        (click)="setDensity('comfortable')"
      >
        Comfortable
      </ui-lib-button>
    </div>

    <a
      aria-label="GitHub"
      class="topbar-link"
      href="https://github.com"
      target="_blank"
      title="GitHub"
    >
      <i class="pi pi-github"></i>
    </a>
    <a aria-label="Documentation" class="topbar-link" href="#" title="Documentation">
      <i class="pi pi-book"></i>
    </a>
    <ui-lib-button
      appearance="ghost"
      aria-label="Toggle dark mode"
      size="sm"
      variant="minimal"
      (click)="onThemeToggle()"
    >
      {{ mode() === 'dark' ? 'Light mode' : 'Dark mode' }}
    </ui-lib-button>
  </div>
</div>
