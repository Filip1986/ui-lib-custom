<ui-lib-icon
  aria-hidden="true"
  class="ui-lib-message__icon"
  [name]="resolvedIcon()"
  [variant]="effectiveVariant()"
/>
<span class="ui-lib-message__content">
  @if (text()) {
    {{ text() }}
  }
  <ng-content />
</span>
@if (closable()) {
  <button
    class="ui-lib-message__close"
    type="button"
    [attr.aria-label]="resolvedCloseAriaLabel()"
    (click)="onClose()"
  >
    <ui-lib-icon aria-hidden="true" name="close" size="sm" [variant]="effectiveVariant()" />
  </button>
}
