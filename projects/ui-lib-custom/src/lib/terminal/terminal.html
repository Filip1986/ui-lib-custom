<div
  #terminalContent
  class="ui-lib-terminal__content"
  role="presentation"
  tabindex="-1"
  (click)="focusInput()"
  (keydown.enter)="focusInput()"
>
  <div
    aria-atomic="false"
    class="ui-lib-terminal__output"
    role="log"
    [attr.aria-label]="i18n.translate('terminal.output')"
    [attr.id]="outputId"
  >
    @if (welcomeMessage()) {
      <div class="ui-lib-terminal__welcome">{{ welcomeMessage() }}</div>
    }
    @for (item of history(); track $index) {
      <div class="ui-lib-terminal__history-item">
        <div class="ui-lib-terminal__command-row">
          <span aria-hidden="true" class="ui-lib-terminal__prompt">{{ prompt() }}</span>
          <span class="ui-lib-terminal__command-text">{{ item.command }}</span>
        </div>
        @if (item.response !== null) {
          <div class="ui-lib-terminal__response">{{ item.response }}</div>
        }
      </div>
    }
  </div>
  <div class="ui-lib-terminal__input-row">
    <span aria-hidden="true" class="ui-lib-terminal__prompt">{{ prompt() }}</span>
    <input
      #commandInput
      aria-autocomplete="none"
      autocomplete="off"
      class="ui-lib-terminal__input"
      spellcheck="false"
      type="text"
      [attr.aria-label]="i18n.translate('terminal.input')"
      [value]="currentCommand()"
      (input)="onInputChange($event)"
      (keydown)="handleKeydown($event)"
    />
  </div>
</div>
