<ui-lib-icon class="alert-icon" [name]="statusIcon()" [variant]="effectiveVariant()" size="lg" />
<div class="alert-content">
  <ng-content />
</div>
@if (dismissible()) {
  <ui-lib-icon
    class="alert-close"
    name="close"
    [variant]="effectiveVariant()"
    size="sm"
    [clickable]="true"
    ariaLabel="Dismiss alert"
    (click)="onDismiss()"
  />
}
