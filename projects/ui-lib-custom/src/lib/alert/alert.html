<ui-lib-icon
  aria-hidden="true"
  class="ui-lib-alert__icon"
  size="lg"
  [name]="statusIcon()"
  [variant]="effectiveVariant()"
/>
<div class="ui-lib-alert__content">
  <ng-content />
</div>
@if (dismissible()) {
  <button
    class="ui-lib-alert__close"
    type="button"
    [attr.aria-label]="dismissLabel() ?? i18n.translate('alert.dismiss')"
    (click)="onDismiss()"
  >
    <ui-lib-icon aria-hidden="true" name="close" size="sm" [variant]="effectiveVariant()" />
  </button>
}
