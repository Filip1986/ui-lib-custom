<ui-lib-icon
  class="ui-lib-alert__icon"
  [name]="statusIcon()"
  [variant]="effectiveVariant()"
  size="lg"
  aria-hidden="true"
/>
<div class="ui-lib-alert__content">
  <ng-content />
</div>
@if (dismissible()) {
  <button
    type="button"
    class="ui-lib-alert__close"
    [attr.aria-label]="dismissLabel() ?? 'Dismiss alert'"
    (click)="onDismiss()"
  >
    <ui-lib-icon name="close" [variant]="effectiveVariant()" size="sm" aria-hidden="true" />
  </button>
}
