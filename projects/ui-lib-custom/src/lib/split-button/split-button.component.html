<div class="ui-lib-split-button__container">
  <button
    class="ui-lib-split-button__default-button"
    type="button"
    [attr.aria-label]="resolvedButtonAriaLabel()"
    [attr.tabindex]="tabindex()"
    [disabled]="isMainButtonDisabled()"
    (click)="onMainButtonClick($event)"
    (keydown)="onMainButtonKeydown($event)"
  >
    @if (loading()) {
      <ui-lib-icon
        aria-hidden="true"
        class="ui-lib-split-button__loading-icon"
        size="sm"
        [name]="loadingIcon()"
      />
    }

    @if (!loading() && iconPosition() === 'left' && icon()) {
      <ui-lib-icon
        aria-hidden="true"
        class="ui-lib-split-button__icon ui-lib-split-button__icon--start"
        size="sm"
        [name]="icon()!"
      />
    }

    @if (contentTemplate()) {
      <ng-container [ngTemplateOutlet]="contentTemplate()!" />
    } @else {
      <span class="ui-lib-split-button__label">{{ label() }}</span>
    }

    @if (!loading() && iconPosition() === 'right' && icon()) {
      <ui-lib-icon
        aria-hidden="true"
        class="ui-lib-split-button__icon ui-lib-split-button__icon--end"
        size="sm"
        [name]="icon()!"
      />
    }
  </button>

  <button
    #menuBtn
    aria-haspopup="menu"
    class="ui-lib-split-button__menu-button"
    type="button"
    [attr.aria-controls]="isMenuOpen() ? menuId() : null"
    [attr.aria-expanded]="isMenuOpen()"
    [attr.aria-label]="menuButtonAriaLabel() || i18n.translate('split-button.more')"
    [attr.tabindex]="tabindex()"
    [disabled]="isMenuButtonDisabled()"
    (click)="onMenuButtonClick($event)"
    (keydown)="onMenuButtonKeydown($event)"
  >
    @if (dropdownIconTemplate()) {
      <ng-container [ngTemplateOutlet]="dropdownIconTemplate()!" />
    } @else {
      <ui-lib-icon aria-hidden="true" size="sm" [name]="dropdownIcon()" />
    }
  </button>
</div>

@if (isMenuOpen()) {
  <ul
    class="ui-lib-split-button__menu"
    role="menu"
    [attr.aria-label]="menuButtonAriaLabel() || i18n.translate('split-button.menu')"
    [id]="menuId()"
  >
    @for (item of visibleItems(); track trackVisibleItem($index, item); let i = $index) {
      @if (item.separator) {
        <li class="ui-lib-split-button__separator" role="separator"></li>
      } @else {
        <li role="none">
          <a
            class="ui-lib-split-button__menu-item"
            role="menuitem"
            [attr.aria-disabled]="item.disabled ? 'true' : null"
            [attr.aria-label]="item.label"
            [attr.data-menu-item-index]="i"
            [attr.href]="item.url ?? null"
            [attr.tabindex]="item.disabled ? -1 : 0"
            [attr.target]="item.url ? item.target || '_self' : null"
            [attr.title]="item.tooltip ?? null"
            [class.ui-lib-split-button__menu-item--disabled]="item.disabled"
            [id]="itemId(i, item)"
            (click)="onItemClick($event, item, i)"
            (keydown)="onItemKeydown($event, item, i)"
          >
            @if (item.icon) {
              <ui-lib-icon
                aria-hidden="true"
                class="ui-lib-split-button__menu-item-icon"
                size="sm"
                [name]="item.icon"
              />
            }
            <span class="ui-lib-split-button__menu-item-label">{{ item.label }}</span>
          </a>
        </li>
      }
    }
  </ul>
}
