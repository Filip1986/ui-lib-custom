<div class="ui-form-field" [class.ui-form-field--error]="showError()">
  @if (label()) {
    <label class="ui-form-field-label" [for]="inputId()" [id]="labelId()">
      {{ label() }}
      @if (required()) {
        <span aria-hidden="true" class="ui-form-field-required-indicator">*</span>
      }
    </label>
  }

  <ng-content />

  @if (showHint()) {
    <div class="ui-form-field-hint" [id]="hintId()">
      {{ hint() }}
    </div>
  }

  @if (showError()) {
    <div aria-live="assertive" class="ui-form-field-error" role="alert" [id]="errorId()">
      {{ error() }}
    </div>
  }
</div>
