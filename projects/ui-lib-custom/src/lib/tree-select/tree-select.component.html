<div
  class="ui-lib-tree-select__trigger"
  tabindex="0"
  [attr.aria-controls]="panelVisible() ? treeId : null"
  (click)="togglePanel($event)"
  (keydown.enter)="togglePanel($event)"
  (keydown.space)="$event.preventDefault(); togglePanel($event)"
>
  <!-- Value / placeholder display -->
  <span class="ui-lib-tree-select__value" [class.ui-lib-tree-select__placeholder]="!hasValue()">
    @if (hasValue()) {
      {{ displayLabel() }}
    } @else {
      {{ resolvedPlaceholder() }}
    }
  </span>

  <!-- Actions: clear, loading spinner, chevron -->
  <span class="ui-lib-tree-select__actions">
    @if (loading()) {
      <span aria-hidden="true" class="ui-lib-tree-select__spinner"></span>
    }

    @if (showClear() && hasValue() && !isDisabled()) {
      <button
        class="ui-lib-tree-select__clear"
        tabindex="-1"
        type="button"
        [attr.aria-label]="i18n.translate('tree-select.clear')"
        (click)="clearSelection($event)"
      >
        <span aria-hidden="true">×</span>
      </button>
    }

    <span
      aria-hidden="true"
      class="ui-lib-tree-select__chevron"
      [class.ui-lib-tree-select__chevron--open]="panelVisible()"
      >▾</span
    >
  </span>
</div>

<!-- Dropdown panel -->
@if (panelVisible()) {
  <div class="ui-lib-tree-select__panel" [id]="panelId">
    <!-- Tree component -->
    @if (nodes().length > 0) {
      <ui-lib-tree
        [ariaLabel]="treeAriaLabel()"
        [filter]="filter()"
        [filterPlaceholder]="resolvedFilterPlaceholder()"
        [hostId]="treeId"
        [selectionMode]="selectionMode()"
        [size]="size()"
        [value]="nodes()"
        [variant]="variant()"
        [(selection)]="selection"
        (nodeCollapse)="handleNodeCollapse($event)"
        (nodeExpand)="handleNodeExpand($event)"
        (nodeSelect)="handleNodeSelect($event)"
        (nodeUnselect)="handleNodeUnselect($event)"
      />
    } @else {
      <div class="ui-lib-tree-select__empty">
        <span>{{ resolvedEmptyMessage() }}</span>
      </div>
    }
  </div>
}

<span aria-atomic="true" aria-live="polite" class="ui-lib-tree-select__sr-live" [id]="liveRegionId">
  {{ selectionAnnouncement() }}
</span>
