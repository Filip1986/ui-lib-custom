@if (showImage()) {
  <img class="ui-lib-chip__image" [alt]="resolvedImageAlt()" [src]="image()!" />
}
@if (showIcon()) {
  <span aria-hidden="true" class="ui-lib-chip__icon" [class]="icon()!"></span>
}
@if (label()) {
  <span class="ui-lib-chip__label">{{ label() }}</span>
}
<ng-content />
@if (removable()) {
  <button
    class="ui-lib-chip__remove-button"
    type="button"
    [attr.aria-label]="removeAriaLabel()"
    (click)="onRemoveClick($event)"
  >
    <span aria-hidden="true" [class]="removeIcon()"></span>
  </button>
}
