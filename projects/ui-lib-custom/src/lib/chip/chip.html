@if (showImage()) {
  <img class="ui-lib-chip__image" [src]="image()!" [alt]="imageAlt()" />
}
@if (showIcon()) {
  <span class="ui-lib-chip__icon" [class]="icon()!" aria-hidden="true"></span>
}
@if (label()) {
  <span class="ui-lib-chip__label">{{ label() }}</span>
}
<ng-content />
@if (removable()) {
  <button
    type="button"
    class="ui-lib-chip__remove-button"
    [attr.aria-label]="removeAriaLabel()"
    (click)="onRemoveClick($event)"
  >
    <span [class]="removeIcon()" aria-hidden="true"></span>
  </button>
}
