@for (context of itemContexts(); track trackItem(context.index, context)) {
  <div
    class="ui-lib-timeline__event"
    role="listitem"
    [attr.aria-labelledby]="eventLabelledBy(context)"
  >
    <div
      class="ui-lib-timeline__opposite"
      [attr.id]="oppositeTemplate() ? eventOppositeId(context.index) : null"
    >
      @if (oppositeTemplate()) {
        <ng-container
          [ngTemplateOutlet]="oppositeTemplate()!"
          [ngTemplateOutletContext]="context"
        />
      }
    </div>
    <div class="ui-lib-timeline__separator">
      @if (!context.first) {
        <span
          class="ui-lib-timeline__connector ui-lib-timeline__connector--before"
          aria-hidden="true"
        ></span>
      }
      <div class="ui-lib-timeline__marker" aria-hidden="true">
        @if (markerTemplate()) {
          <ng-container
            [ngTemplateOutlet]="markerTemplate()!"
            [ngTemplateOutletContext]="context"
          />
        } @else {
          <span class="ui-lib-timeline__dot" aria-hidden="true"></span>
        }
      </div>
      @if (!context.last) {
        <span
          class="ui-lib-timeline__connector ui-lib-timeline__connector--after"
          aria-hidden="true"
        ></span>
      }
    </div>
    <div class="ui-lib-timeline__content" [attr.id]="eventContentId(context.index)">
      @if (contentTemplate()) {
        <ng-container
          [ngTemplateOutlet]="contentTemplate()!"
          [ngTemplateOutletContext]="context"
        />
      } @else {
        <span class="ui-lib-timeline__default-content">
          {{ defaultEventContent(context.$implicit, context.index) }}
        </span>
      }
    </div>
  </div>
}
