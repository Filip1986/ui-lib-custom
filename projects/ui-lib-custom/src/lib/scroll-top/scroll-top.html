<button
  class="ui-lib-scroll-top__button"
  type="button"
  [attr.aria-hidden]="isVisible() ? null : 'true'"
  [attr.aria-label]="resolvedButtonAriaLabel()"
  [attr.tabindex]="isVisible() ? null : '-1'"
  (click)="scrollToTop()"
>
  <!-- Default icon — rendered when the icon input is non-empty and no slot content is projected -->
  @if (icon()) {
    <span aria-hidden="true" [class]="icon()"></span>
  }
  <!-- Consumer-provided icon — SVG, component, or any inline markup -->
  <ng-content select="[uilib-icon]" />
</button>
