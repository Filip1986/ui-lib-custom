<div
  class="ui-lib-editor-toolbar"
  role="toolbar"
  [attr.aria-disabled]="isDisabled() || readonly() || null"
  [attr.aria-label]="i18n.translate('editor.toolbar')"
>
  <span aria-hidden="true" editorToolbar hidden></span>
  <ng-content select="[editorToolbar]" />

  @if (!hasCustomToolbar()) {
    <span class="ui-lib-editor-toolbar-group">
      <select
        class="ui-lib-editor-toolbar-select"
        [attr.aria-label]="toolbarAriaLabels.heading"
        [disabled]="isDisabled() || readonly()"
        [value]="toolbarState().blockFormat"
        (change)="onHeadingChange($event)"
        (mousedown)="onToolbarMouseDown($event)"
      >
        <option value="p">Normal</option>
        <option value="h1">Heading 1</option>
        <option value="h2">Heading 2</option>
        <option value="h3">Heading 3</option>
        <option value="pre">Code Block</option>
      </select>
    </span>

    <span aria-hidden="true" class="ui-lib-editor-toolbar-separator"></span>

    <span class="ui-lib-editor-toolbar-group">
      <button
        class="ui-lib-editor-toolbar-button"
        type="button"
        [attr.aria-label]="toolbarAriaLabels.bold"
        [attr.aria-pressed]="toolbarState().bold"
        [class.ui-lib-editor-toolbar-button--active]="toolbarState().bold"
        [disabled]="isDisabled() || readonly()"
        (click)="onToolbarButtonClick($event, 'bold')"
        (mousedown)="onToolbarMouseDown($event)"
      >
        <b>B</b>
      </button>

      <button
        class="ui-lib-editor-toolbar-button"
        type="button"
        [attr.aria-label]="toolbarAriaLabels.italic"
        [attr.aria-pressed]="toolbarState().italic"
        [class.ui-lib-editor-toolbar-button--active]="toolbarState().italic"
        [disabled]="isDisabled() || readonly()"
        (click)="onToolbarButtonClick($event, 'italic')"
        (mousedown)="onToolbarMouseDown($event)"
      >
        <i>I</i>
      </button>

      <button
        class="ui-lib-editor-toolbar-button"
        type="button"
        [attr.aria-label]="toolbarAriaLabels.underline"
        [attr.aria-pressed]="toolbarState().underline"
        [class.ui-lib-editor-toolbar-button--active]="toolbarState().underline"
        [disabled]="isDisabled() || readonly()"
        (click)="onToolbarButtonClick($event, 'underline')"
        (mousedown)="onToolbarMouseDown($event)"
      >
        <u>U</u>
      </button>

      <button
        class="ui-lib-editor-toolbar-button"
        type="button"
        [attr.aria-label]="toolbarAriaLabels.strikeThrough"
        [attr.aria-pressed]="toolbarState().strikeThrough"
        [class.ui-lib-editor-toolbar-button--active]="toolbarState().strikeThrough"
        [disabled]="isDisabled() || readonly()"
        (click)="onToolbarButtonClick($event, 'strikeThrough')"
        (mousedown)="onToolbarMouseDown($event)"
      >
        <s>S</s>
      </button>

      <button
        class="ui-lib-editor-toolbar-button"
        type="button"
        [attr.aria-label]="toolbarAriaLabels.textColor"
        [disabled]="isDisabled() || readonly()"
        (click)="onTextColorClick()"
        (mousedown)="onToolbarMouseDown($event)"
      >
        A
      </button>

      <button
        class="ui-lib-editor-toolbar-button"
        type="button"
        [attr.aria-label]="toolbarAriaLabels.backgroundColor"
        [disabled]="isDisabled() || readonly()"
        (click)="onBackgroundColorClick()"
        (mousedown)="onToolbarMouseDown($event)"
      >
        BG
      </button>
    </span>

    <span aria-hidden="true" class="ui-lib-editor-toolbar-separator"></span>

    <span class="ui-lib-editor-toolbar-group">
      <button
        class="ui-lib-editor-toolbar-button"
        type="button"
        [attr.aria-label]="toolbarAriaLabels.orderedList"
        [attr.aria-pressed]="toolbarState().orderedList"
        [class.ui-lib-editor-toolbar-button--active]="toolbarState().orderedList"
        [disabled]="isDisabled() || readonly()"
        (click)="onToolbarButtonClick($event, 'insertOrderedList')"
        (mousedown)="onToolbarMouseDown($event)"
      >
        OL
      </button>

      <button
        class="ui-lib-editor-toolbar-button"
        type="button"
        [attr.aria-label]="toolbarAriaLabels.unorderedList"
        [attr.aria-pressed]="toolbarState().unorderedList"
        [class.ui-lib-editor-toolbar-button--active]="toolbarState().unorderedList"
        [disabled]="isDisabled() || readonly()"
        (click)="onToolbarButtonClick($event, 'insertUnorderedList')"
        (mousedown)="onToolbarMouseDown($event)"
      >
        UL
      </button>
    </span>

    <span aria-hidden="true" class="ui-lib-editor-toolbar-separator"></span>

    <span class="ui-lib-editor-toolbar-group">
      <button
        class="ui-lib-editor-toolbar-button"
        type="button"
        [attr.aria-label]="toolbarAriaLabels.alignLeft"
        [attr.aria-pressed]="toolbarState().alignLeft"
        [class.ui-lib-editor-toolbar-button--active]="toolbarState().alignLeft"
        [disabled]="isDisabled() || readonly()"
        (click)="onToolbarButtonClick($event, 'justifyLeft')"
        (mousedown)="onToolbarMouseDown($event)"
      >
        L
      </button>

      <button
        class="ui-lib-editor-toolbar-button"
        type="button"
        [attr.aria-label]="toolbarAriaLabels.alignCenter"
        [attr.aria-pressed]="toolbarState().alignCenter"
        [class.ui-lib-editor-toolbar-button--active]="toolbarState().alignCenter"
        [disabled]="isDisabled() || readonly()"
        (click)="onToolbarButtonClick($event, 'justifyCenter')"
        (mousedown)="onToolbarMouseDown($event)"
      >
        C
      </button>

      <button
        class="ui-lib-editor-toolbar-button"
        type="button"
        [attr.aria-label]="toolbarAriaLabels.alignRight"
        [attr.aria-pressed]="toolbarState().alignRight"
        [class.ui-lib-editor-toolbar-button--active]="toolbarState().alignRight"
        [disabled]="isDisabled() || readonly()"
        (click)="onToolbarButtonClick($event, 'justifyRight')"
        (mousedown)="onToolbarMouseDown($event)"
      >
        R
      </button>

      <button
        class="ui-lib-editor-toolbar-button"
        type="button"
        [attr.aria-label]="toolbarAriaLabels.alignJustify"
        [attr.aria-pressed]="toolbarState().alignJustify"
        [class.ui-lib-editor-toolbar-button--active]="toolbarState().alignJustify"
        [disabled]="isDisabled() || readonly()"
        (click)="onToolbarButtonClick($event, 'justifyFull')"
        (mousedown)="onToolbarMouseDown($event)"
      >
        J
      </button>
    </span>

    <span aria-hidden="true" class="ui-lib-editor-toolbar-separator"></span>

    <span class="ui-lib-editor-toolbar-group">
      <button
        class="ui-lib-editor-toolbar-button"
        type="button"
        [attr.aria-label]="toolbarAriaLabels.createLink"
        [disabled]="isDisabled() || readonly()"
        (click)="onInsertLink()"
        (mousedown)="onToolbarMouseDown($event)"
      >
        Link
      </button>

      <button
        class="ui-lib-editor-toolbar-button"
        type="button"
        [attr.aria-label]="toolbarAriaLabels.unlink"
        [disabled]="isDisabled() || readonly()"
        (click)="onToolbarButtonClick($event, 'unlink')"
        (mousedown)="onToolbarMouseDown($event)"
      >
        Unlink
      </button>

      <button
        class="ui-lib-editor-toolbar-button"
        type="button"
        [attr.aria-label]="toolbarAriaLabels.insertImage"
        [disabled]="isDisabled() || readonly()"
        (click)="onInsertImage()"
        (mousedown)="onToolbarMouseDown($event)"
      >
        Image
      </button>

      <button
        class="ui-lib-editor-toolbar-button"
        type="button"
        [attr.aria-label]="toolbarAriaLabels.codeBlock"
        [disabled]="isDisabled() || readonly()"
        (click)="onToolbarButtonClick($event, 'insertHTML', '<pre><code></code></pre>')"
        (mousedown)="onToolbarMouseDown($event)"
      >
        Code
      </button>
    </span>

    <span aria-hidden="true" class="ui-lib-editor-toolbar-separator"></span>

    <span class="ui-lib-editor-toolbar-group">
      <button
        class="ui-lib-editor-toolbar-button"
        type="button"
        [attr.aria-label]="toolbarAriaLabels.removeFormat"
        [disabled]="isDisabled() || readonly()"
        (click)="onToolbarButtonClick($event, 'removeFormat')"
        (mousedown)="onToolbarMouseDown($event)"
      >
        Clear
      </button>
    </span>
  }
</div>

<div
  #editorContent
  class="ui-lib-editor-content"
  [attr.aria-disabled]="isDisabled() || null"
  [attr.aria-label]="
    ariaLabel() || (ariaLabelledBy() ? null : i18n.translate('editor.content.label'))
  "
  [attr.aria-labelledby]="ariaLabelledBy()"
  [attr.aria-multiline]="'true'"
  [attr.aria-readonly]="readonly() || null"
  [attr.contenteditable]="!isDisabled() && !readonly()"
  [attr.data-placeholder]="placeholder()"
  [attr.role]="'textbox'"
></div>
