<button
  #headerButton
  class="ui-lib-accordion-panel__header"
  role="button"
  type="button"
  [attr.aria-controls]="panelId()"
  [attr.aria-disabled]="disabled() ? true : null"
  [attr.aria-expanded]="isExpanded()"
  [attr.id]="headerId()"
  (click)="toggle()"
  (keydown)="onKeydown($event)"
>
  @if (showIcon() && iconPosition() === 'start') {
    <span
      aria-hidden="true"
      class="ui-lib-accordion-panel__icon ui-lib-accordion-panel__icon--start"
      [class.ui-lib-accordion-panel__icon--expanded]="isExpanded()"
    >
      @if (toggleIconTemplate(); as iconTpl) {
        <span class="ui-lib-accordion-panel__icon-collapsed">
          <ng-container
            [ngTemplateOutlet]="iconTpl.template"
            [ngTemplateOutletContext]="{ $implicit: false, expanded: false }"
          />
        </span>
        <span class="ui-lib-accordion-panel__icon-expanded">
          <ng-container
            [ngTemplateOutlet]="iconTpl.template"
            [ngTemplateOutletContext]="{ $implicit: true, expanded: true }"
          />
        </span>
      } @else {
        <ui-lib-icon class="ui-lib-accordion-panel__icon-collapsed" [name]="collapseIcon()" />
        <ui-lib-icon class="ui-lib-accordion-panel__icon-expanded" [name]="expandIcon()" />
      }
    </span>
  }
  <ng-content select="[accordionHeader]" />
  @if (!hasCustomHeader()) {
    <span class="ui-lib-accordion-panel__title">{{ header() }}</span>
  }
  @if (showIcon() && iconPosition() === 'end') {
    <span
      aria-hidden="true"
      class="ui-lib-accordion-panel__icon ui-lib-accordion-panel__icon--end"
      [class.ui-lib-accordion-panel__icon--expanded]="isExpanded()"
    >
      @if (toggleIconTemplate(); as iconTpl) {
        <span class="ui-lib-accordion-panel__icon-collapsed">
          <ng-container
            [ngTemplateOutlet]="iconTpl.template"
            [ngTemplateOutletContext]="{ $implicit: false, expanded: false }"
          />
        </span>
        <span class="ui-lib-accordion-panel__icon-expanded">
          <ng-container
            [ngTemplateOutlet]="iconTpl.template"
            [ngTemplateOutletContext]="{ $implicit: true, expanded: true }"
          />
        </span>
      } @else {
        <ui-lib-icon class="ui-lib-accordion-panel__icon-collapsed" [name]="collapseIcon()" />
        <ui-lib-icon class="ui-lib-accordion-panel__icon-expanded" [name]="expandIcon()" />
      }
    </span>
  }
</button>
<div
  class="ui-lib-accordion-panel__content"
  role="region"
  [attr.aria-labelledby]="headerId()"
  [attr.data-state]="isExpanded() ? panelStates.Expanded : panelStates.Collapsed"
  [attr.hidden]="isExpanded() ? null : ''"
  [attr.id]="panelId()"
  [class.ui-lib-accordion-panel__content--expanded]="isExpanded()"
>
  <div class="ui-lib-accordion-panel__body">
    <div class="ui-lib-accordion-panel__body-inner">
      <ng-content />
    </div>
  </div>
</div>
