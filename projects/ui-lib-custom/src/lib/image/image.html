<!-- ─── Image wrapper ──────────────────────────────────────────────────────────── -->
<div
  class="uilib-image__wrapper"
  [class.uilib-image__wrapper--previewable]="preview()"
  (mouseenter)="onMouseEnter()"
  (mouseleave)="onMouseLeave()"
>
  <!-- Main image (or error fallback) -->
  @if (!hasError()) {
    <img
      [attr.alt]="alt()"
      [attr.height]="height()"
      [attr.width]="width()"
      [class]="imgClasses()"
      [ngStyle]="imageStyle()"
      [src]="activeSrc() || src()"
      (error)="onError($event)"
      (load)="onLoad($event)"
    />
  } @else if (errorTemplate()) {
    <ng-container [ngTemplateOutlet]="errorTemplate()!" />
  } @else {
    <div
      class="uilib-image__error"
      role="img"
      [attr.aria-label]="alt() || i18n.translate('image.error')"
    >
      <!-- Broken image icon -->
      <svg
        aria-hidden="true"
        class="uilib-image__error-icon"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        viewBox="0 0 24 24"
      >
        <rect height="18" rx="2" ry="2" width="18" x="3" y="3" />
        <circle cx="8.5" cy="8.5" r="1.5" />
        <polyline points="21 15 16 10 5 21" />
      </svg>
    </div>
  }

  <!-- Preview indicator overlay (visible on hover when preview is enabled) -->
  @if (preview() && !hasError()) {
    <button
      #indicatorButton
      class="uilib-image__indicator"
      type="button"
      [attr.aria-controls]="previewVisible() ? previewId : null"
      [attr.aria-expanded]="previewVisible()"
      [attr.aria-haspopup]="'dialog'"
      [attr.aria-label]="resolvedAriaLabel()"
      [class.uilib-image__indicator--visible]="isHovered()"
      (click)="openPreview(indicatorButton)"
    >
      @if (indicatorTemplate()) {
        <ng-container [ngTemplateOutlet]="indicatorTemplate()!" />
      } @else {
        <!-- Default: eye icon -->
        <svg
          aria-hidden="true"
          class="uilib-image__indicator-icon"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
      }
    </button>
  }
</div>

<!-- ─── Preview overlay ───────────────────────────────────────────────────────── -->
@if (preview() && previewVisible()) {
  <div
    #imageMask
    aria-modal="true"
    class="uilib-image__mask"
    role="dialog"
    tabindex="-1"
    [attr.aria-describedby]="previewStatusId"
    [attr.aria-label]="resolvedAriaLabel()"
    [attr.id]="previewId"
    (click)="onMaskClick($event)"
    (keydown)="onMaskKeyDown($event)"
  >
    <span
      aria-atomic="true"
      aria-live="polite"
      class="uilib-image__sr-live"
      [attr.id]="previewStatusId"
    >
      {{ previewStatusMessage() }}
    </span>

    <!-- Toolbar -->
    <div
      class="uilib-image__toolbar"
      role="toolbar"
      [attr.aria-label]="i18n.translate('image.controls')"
      [attr.id]="previewToolbarId"
    >
      <!-- Zoom in -->
      <button
        class="uilib-image__toolbar-btn"
        type="button"
        [attr.aria-disabled]="zoomInDisabled()"
        [attr.aria-label]="i18n.translate('image.zoom-in')"
        [disabled]="zoomInDisabled()"
        (click)="zoomIn()"
      >
        <svg
          aria-hidden="true"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <circle cx="11" cy="11" r="8" />
          <line x1="21" x2="16.65" y1="21" y2="16.65" />
          <line x1="11" x2="11" y1="8" y2="14" />
          <line x1="8" x2="14" y1="11" y2="11" />
        </svg>
      </button>

      <!-- Zoom out -->
      <button
        class="uilib-image__toolbar-btn"
        type="button"
        [attr.aria-disabled]="zoomOutDisabled()"
        [attr.aria-label]="i18n.translate('image.zoom-out')"
        [disabled]="zoomOutDisabled()"
        (click)="zoomOut()"
      >
        <svg
          aria-hidden="true"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <circle cx="11" cy="11" r="8" />
          <line x1="21" x2="16.65" y1="21" y2="16.65" />
          <line x1="8" x2="14" y1="11" y2="11" />
        </svg>
      </button>

      <!-- Rotate left -->
      <button
        class="uilib-image__toolbar-btn"
        type="button"
        [attr.aria-label]="i18n.translate('image.rotate-left')"
        (click)="rotateLeft()"
      >
        <svg
          aria-hidden="true"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <polyline points="1 4 1 10 7 10" />
          <path d="M3.51 15a9 9 0 1 0 .49-3.51" />
        </svg>
      </button>

      <!-- Rotate right -->
      <button
        class="uilib-image__toolbar-btn"
        type="button"
        [attr.aria-label]="i18n.translate('image.rotate-right')"
        (click)="rotateRight()"
      >
        <svg
          aria-hidden="true"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <polyline points="23 4 23 10 17 10" />
          <path d="M20.49 15a9 9 0 1 1-.49-3.51" />
        </svg>
      </button>

      <!-- Close -->
      <button
        class="uilib-image__toolbar-btn uilib-image__toolbar-btn--close"
        type="button"
        [attr.aria-label]="i18n.translate('image.close')"
        (click)="closePreview()"
      >
        <svg
          aria-hidden="true"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <line x1="18" x2="6" y1="6" y2="18" />
          <line x1="6" x2="18" y1="6" y2="18" />
        </svg>
      </button>
    </div>

    <!-- Preview image -->
    <div class="uilib-image__preview-container">
      <img
        class="uilib-image__preview-img"
        [attr.alt]="alt()"
        [src]="activeSrc() || src()"
        [style.transform]="previewTransform()"
      />
    </div>
  </div>
}
