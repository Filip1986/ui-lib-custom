<!-- ─── Image wrapper ──────────────────────────────────────────────────────────── -->
<div
  class="uilib-image__wrapper"
  [class.uilib-image__wrapper--previewable]="preview()"
  (mouseenter)="onMouseEnter()"
  (mouseleave)="onMouseLeave()"
>
  <!-- Main image (or error fallback) -->
  @if (!hasError()) {
    <img
      [class]="imgClasses()"
      [ngStyle]="imageStyle()"
      [src]="activeSrc() || src()"
      [attr.alt]="alt()"
      [attr.width]="width()"
      [attr.height]="height()"
      (load)="onLoad($event)"
      (error)="onError($event)"
    />
  } @else if (errorTemplate()) {
    <ng-container [ngTemplateOutlet]="errorTemplate()!" />
  } @else {
    <div class="uilib-image__error" role="img" [attr.aria-label]="alt() || 'Image failed to load'">
      <!-- Broken image icon -->
      <svg
        class="uilib-image__error-icon"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        aria-hidden="true"
      >
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
        <circle cx="8.5" cy="8.5" r="1.5" />
        <polyline points="21 15 16 10 5 21" />
      </svg>
    </div>
  }

  <!-- Preview indicator overlay (visible on hover when preview is enabled) -->
  @if (preview() && !hasError()) {
    <button
      type="button"
      class="uilib-image__indicator"
      [class.uilib-image__indicator--visible]="isHovered()"
      [attr.aria-label]="ariaLabel()"
      [attr.aria-haspopup]="'dialog'"
      [attr.aria-controls]="componentId + '-preview'"
      (click)="openPreview()"
    >
      @if (indicatorTemplate()) {
        <ng-container [ngTemplateOutlet]="indicatorTemplate()!" />
      } @else {
        <!-- Default: eye icon -->
        <svg
          class="uilib-image__indicator-icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          aria-hidden="true"
        >
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
      }
    </button>
  }
</div>

<!-- ─── Preview overlay ───────────────────────────────────────────────────────── -->
@if (preview() && previewVisible()) {
  <div
    class="uilib-image__mask"
    role="dialog"
    aria-modal="true"
    [attr.id]="componentId + '-preview'"
    [attr.aria-label]="ariaLabel()"
    tabindex="-1"
    (click)="onMaskClick($event)"
    (keydown)="onMaskKeyDown($event)"
  >
    <!-- Toolbar -->
    <div class="uilib-image__toolbar" role="toolbar" aria-label="Image controls">
      <!-- Zoom in -->
      <button
        type="button"
        class="uilib-image__toolbar-btn"
        [disabled]="zoomInDisabled()"
        [attr.aria-label]="zoomInAriaLabel"
        [attr.aria-disabled]="zoomInDisabled()"
        (click)="zoomIn()"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
          <line x1="11" y1="8" x2="11" y2="14" />
          <line x1="8" y1="11" x2="14" y2="11" />
        </svg>
      </button>

      <!-- Zoom out -->
      <button
        type="button"
        class="uilib-image__toolbar-btn"
        [disabled]="zoomOutDisabled()"
        [attr.aria-label]="zoomOutAriaLabel"
        [attr.aria-disabled]="zoomOutDisabled()"
        (click)="zoomOut()"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
          <line x1="8" y1="11" x2="14" y2="11" />
        </svg>
      </button>

      <!-- Rotate left -->
      <button
        type="button"
        class="uilib-image__toolbar-btn"
        [attr.aria-label]="rotateLeftAriaLabel"
        (click)="rotateLeft()"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <polyline points="1 4 1 10 7 10" />
          <path d="M3.51 15a9 9 0 1 0 .49-3.51" />
        </svg>
      </button>

      <!-- Rotate right -->
      <button
        type="button"
        class="uilib-image__toolbar-btn"
        [attr.aria-label]="rotateRightAriaLabel"
        (click)="rotateRight()"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <polyline points="23 4 23 10 17 10" />
          <path d="M20.49 15a9 9 0 1 1-.49-3.51" />
        </svg>
      </button>

      <!-- Close -->
      <button
        type="button"
        class="uilib-image__toolbar-btn uilib-image__toolbar-btn--close"
        [attr.aria-label]="closeAriaLabel"
        (click)="closePreview()"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>

    <!-- Preview image -->
    <div class="uilib-image__preview-container">
      <img
        class="uilib-image__preview-img"
        [src]="activeSrc() || src()"
        [attr.alt]="alt()"
        [style.transform]="previewTransform()"
      />
    </div>
  </div>
}
