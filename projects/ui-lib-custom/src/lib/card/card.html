<div
  [ngClass]="cardClasses()"
  [attr.role]="hoverable() ? 'button' : null"
  [attr.tabindex]="hoverable() ? 0 : null"
  [attr.aria-label]="hoverable() ? ariaLabel() || null : null"
  (keydown)="onKeydown($event)"
  [style.--uilib-card-shadow]="shadow()"
  [style.--uilib-card-shadow-hover]="shadow()"
  [style.--uilib-card-header-bg]="headerBg()"
  [style.--uilib-card-footer-bg]="footerBg()"
>
  @if (headerVisible()) {
    <div class="card-header">
      @if (headerIcon()) {
        <ui-lib-icon
          class="card-header-icon"
          [name]="headerIcon()!"
          [variant]="effectiveVariant()"
          size="lg"
        />
      }
      <div class="card-header-text">
        <div class="card-title">
          <ng-content select="[card-header]"></ng-content>
        </div>
        @if (subtitle()) {
          <div class="card-subtitle">{{ subtitle() }}</div>
        }
      </div>
      @if (closable()) {
        <ui-lib-icon
          class="card-close-icon"
          name="close"
          [variant]="effectiveVariant()"
          size="md"
          [clickable]="true"
          ariaLabel="Close card"
          (click)="onClose()"
        />
      }
    </div>
  }
  <div class="card-body">
    <ng-content></ng-content>
  </div>
  @if (footerVisible()) {
    <div class="card-footer">
      <ng-content select="[card-footer]"></ng-content>
    </div>
  }
</div>
