@if (visible()) {
  <!-- Transparent overlay catches click-away to dismiss the popup -->
  <div aria-hidden="true" class="ui-lib-confirm-popup__overlay" (click)="onOverlayClick()"></div>

  <!-- The floating popup panel, anchored near the target element -->
  <div
    aria-modal="true"
    role="alertdialog"
    tabindex="-1"
    [attr.aria-describedby]="messageId"
    [attr.aria-label]="panelAriaLabel()"
    [class]="panelClasses()"
    [style.left.px]="panelLeft()"
    [style.top.px]="panelTop()"
    (keydown)="onPanelKeydown($event)"
  >
    <!-- Arrow pointing toward the target element -->
    <div
      aria-hidden="true"
      class="ui-lib-confirm-popup__arrow"
      [style.left.px]="arrowLeftOffset()"
    ></div>

    <div class="ui-lib-confirm-popup__content" [id]="messageId">
      @if (resolvedIcon()) {
        <i aria-hidden="true" class="ui-lib-confirm-popup__icon" [class]="resolvedIcon()"></i>
      }
      <p class="ui-lib-confirm-popup__message">{{ resolvedMessage() }}</p>
    </div>

    <div class="ui-lib-confirm-popup__footer">
      <button type="button" [class]="rejectBtnClasses()" (click)="handleReject()">
        @if (resolvedRejectIcon()) {
          <i aria-hidden="true" [class]="resolvedRejectIcon()"></i>
        }
        {{ resolvedRejectLabel() }}
      </button>

      <button type="button" [class]="acceptBtnClasses()" (click)="handleAccept()">
        @if (resolvedAcceptIcon()) {
          <i aria-hidden="true" [class]="resolvedAcceptIcon()"></i>
        }
        {{ resolvedAcceptLabel() }}
      </button>
    </div>
  </div>
}
