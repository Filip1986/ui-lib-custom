<!-- Visually-hidden native radio input: provides keyboard access and form integration -->
<input
  class="ui-lib-radio-button__native-input"
  type="radio"
  [attr.aria-describedby]="ariaDescribedby()"
  [attr.aria-disabled]="isDisabled() ? 'true' : null"
  [attr.aria-invalid]="invalid() ? 'true' : null"
  [attr.aria-label]="ariaLabel()"
  [attr.aria-labelledby]="ariaLabelledbyResolved()"
  [attr.aria-required]="required() ? 'true' : null"
  [attr.tabindex]="hostTabIndex()"
  [checked]="isChecked()"
  [disabled]="isDisabled()"
  [id]="getNativeInputId()"
  [name]="name()"
  [required]="required()"
  (blur)="onNativeBlur($event)"
  (click)="onSelect($event)"
  (focus)="onFocusIn($event)"
  (keydown)="onNativeKeydown($event)"
/>

<!-- Custom visual circle indicator -->
<div aria-hidden="true" class="ui-lib-radio-button__box" role="presentation">
  <span class="ui-lib-radio-button__icon"></span>
</div>

<!-- Optional label -->
@if (label()) {
  <label class="ui-lib-radio-button__label" [for]="getNativeInputId()" [id]="getLabelElementId()">
    {{ label() }}
  </label>
}

<!-- Projected content (alternative to label input) -->
<ng-content />
