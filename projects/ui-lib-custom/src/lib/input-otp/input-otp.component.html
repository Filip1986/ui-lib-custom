@for (index of cellIndices(); track index) {
  <input
    #cellInput
    [type]="inputType()"
    [inputMode]="inputMode()"
    [value]="getToken(index)"
    [disabled]="isControlDisabled()"
    [readOnly]="readonly()"
    [tabindex]="tabindex()"
    [attr.aria-label]="getCellAriaLabel(index)"
    [attr.aria-invalid]="invalid() ? 'true' : null"
    [attr.autocomplete]="index === 0 ? 'one-time-code' : 'off'"
    [attr.maxlength]="index === 0 ? length() : 1"
    [class]="styleClass()"
    class="ui-lib-input-otp-cell"
    (input)="onCellInput($event, index)"
    (keydown)="onCellKeydown($event, index)"
    (focus)="onCellFocus($event)"
    (blur)="onCellBlur($event)"
    (paste)="onCellPaste($event)"
  />
}

@if (invalid()) {
  <span [id]="errorId()" role="alert" class="ui-lib-input-otp-error">
    <ng-content select="[inputOtpError]" />
  </span>
}

<span aria-live="polite" aria-atomic="true" class="ui-lib-input-otp-sr-only">
  {{ liveAnnouncement() }}
</span>
