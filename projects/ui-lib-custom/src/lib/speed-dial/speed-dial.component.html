<button
  #triggerBtn
  class="ui-lib-speed-dial__button"
  type="button"
  [attr.aria-controls]="listId"
  [attr.aria-disabled]="disabled() ? 'true' : null"
  [attr.aria-expanded]="visible() ? 'true' : 'false'"
  [attr.aria-haspopup]="'true'"
  [attr.aria-label]="triggerAriaLabel()"
  [attr.aria-labelledby]="ariaLabelledBy()"
  [disabled]="disabled()"
  [tabindex]="tabindex()"
  (click)="toggle($event)"
  (keydown)="onButtonKeydown($event)"
>
  @if (buttonTemplate(); as projectedButtonTemplate) {
    <ng-container
      [ngTemplateOutlet]="projectedButtonTemplate"
      [ngTemplateOutletContext]="{ $implicit: visible() }"
    />
  } @else {
    @if (iconTemplate(); as projectedIconTemplate) {
      <ng-container
        [ngTemplateOutlet]="projectedIconTemplate"
        [ngTemplateOutletContext]="{ $implicit: visible() }"
      />
    } @else {
      <ui-lib-icon [name]="visible() && hideIcon() ? hideIcon()! : showIcon()" />
    }
  }
</button>

<ul
  #listElement
  class="ui-lib-speed-dial__list"
  role="menu"
  [attr.aria-hidden]="!visible()"
  [hidden]="!visible()"
  [id]="listId"
>
  @for (item of visibleItems(); track $index; let i = $index) {
    <li class="ui-lib-speed-dial__item" role="none">
      <button
        #itemAction
        class="ui-lib-speed-dial__action"
        role="menuitem"
        type="button"
        [attr.aria-disabled]="item.disabled === true ? 'true' : null"
        [attr.aria-label]="item.label ?? null"
        [attr.id]="itemId(i)"
        [attr.tabindex]="visible() ? 0 : -1"
        [attr.title]="item.tooltip ?? null"
        [disabled]="item.disabled === true"
        [style.transform]="itemTransform()[i]"
        [style.transition-delay]="itemTransitionDelay()[i]"
        (click)="onItemClick($event, item, i)"
        (keydown)="onItemKeydown($event, item, i)"
      >
        @if (itemTemplate(); as projectedItemTemplate) {
          <ng-container
            [ngTemplateOutlet]="projectedItemTemplate"
            [ngTemplateOutletContext]="{ $implicit: item, index: i }"
          />
        } @else {
          @if (item.icon; as itemIcon) {
            <ui-lib-icon [name]="itemIcon" />
          }
          @if (item.label; as itemLabel) {
            <span class="ui-lib-speed-dial__label">{{ itemLabel }}</span>
          }
        }
      </button>
    </li>
  }
</ul>

@if (mask() && visible()) {
  <div
    class="ui-lib-speed-dial__mask"
    [attr.aria-hidden]="true"
    (click)="onMaskClick($event)"
  ></div>
}
