<!-- Filter input -->
@if (filter()) {
  <div class="uilib-tree-filter">
    <input
      type="text"
      class="uilib-tree-filter-input"
      [placeholder]="resolvedFilterPlaceholder()"
      [value]="filterText()"
      [attr.aria-label]="i18n.translate('tree.filter-placeholder')"
      (input)="onFilterInput($event)"
    />
    <span class="uilib-tree-filter-icon pi pi-search" aria-hidden="true"></span>
  </div>
}

<!-- Root nodes — role="none" because role="tree" is on the host element -->
<ul class="uilib-tree-root" role="none">
  @for (rootNode of value(); track rootNode.key; let i = $index) {
    @if (isNodeFiltered(rootNode)) {
      <li role="none">
        <ui-lib-tree-node
          [node]="rootNode"
          [depth]="0"
          [setsize]="value().length"
          [posinset]="i + 1"
        />
      </li>
    }
  } @empty {
    <li class="uilib-tree-empty" role="presentation">
      <span class="uilib-tree-empty-message">{{ resolvedEmptyMessage() }}</span>
    </li>
  }
</ul>
