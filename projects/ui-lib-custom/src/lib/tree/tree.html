<!-- Filter input -->
@if (filter()) {
  <div class="uilib-tree-filter">
    <input
      type="text"
      class="uilib-tree-filter-input"
      [placeholder]="filterPlaceholder()"
      [value]="filterText()"
      aria-label="Filter tree"
      (input)="onFilterInput($event)"
    />
    <span class="uilib-tree-filter-icon pi pi-search" aria-hidden="true"></span>
  </div>
}

<!-- Root nodes -->
<ul class="uilib-tree-root" role="presentation">
  @for (rootNode of visibleRootNodes(); track rootNode.key; let rootIndex = $index) {
    <li role="none">
      <ui-lib-tree-node
        [node]="rootNode"
        [depth]="0"
        [setsize]="visibleRootNodes().length"
        [posinset]="rootIndex + 1"
      />
    </li>
  } @empty {
    <li class="uilib-tree-empty" role="presentation">
      <span class="uilib-tree-empty-message">No items to display</span>
    </li>
  }
</ul>
