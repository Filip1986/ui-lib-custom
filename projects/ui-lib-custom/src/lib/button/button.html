<button
  #btnEl
  [ngClass]="buttonClasses()"
  [attr.type]="type()"
  [disabled]="isDisabled()"
  [attr.aria-disabled]="ariaDisabled()"
  [attr.aria-busy]="loading() ? true : null"
  [attr.aria-label]="ariaLabelResolved()"
  [attr.role]="role()"
  [attr.tabindex]="tabIndex()"
  [attr.aria-pressed]="ariaPressed() === null ? null : ariaPressed()"
  [attr.aria-checked]="ariaChecked() === null ? null : ariaChecked()"
  [style.--uilib-button-shadow]="shadow()"
  [style.--uilib-button-shadow-hover]="shadow()"
  [style.pointer-events]="isDisabled() ? 'none' : null"
  (focus)="setFocused(true)"
  (blur)="setFocused(false)"
>
  @if ((iconPosition() === 'left' || iconPosition() === 'top') && icon()) {
    <ui-lib-icon
      class="ui-lib-button__icon ui-lib-button__icon--start"
      [name]="icon()!"
      [size]="iconSize()"
      [variant]="effectiveVariant()"
    />
  }

  <span class="ui-lib-button__content">
    <ng-content />
  </span>

  @if ((iconPosition() === 'right' || iconPosition() === 'bottom') && icon()) {
    <ui-lib-icon
      class="ui-lib-button__icon ui-lib-button__icon--end"
      [name]="icon()!"
      [size]="iconSize()"
      [variant]="effectiveVariant()"
    />
  }

  @if (loading()) {
    <ui-lib-icon
      class="ui-lib-button__icon ui-lib-button__icon--loading"
      [name]="loadingIcon()"
      [size]="iconSize()"
    />
  }

  @if (hasBadge()) {
    <span class="ui-lib-button__badge-wrapper" [ngClass]="badgeClass()">
      <ui-lib-badge
        class="ui-lib-button__badge"
        [color]="badgeColorResolved()"
        size="sm"
        variant="solid"
        [pill]="true"
      >
        {{ badge() }}
      </ui-lib-badge>
    </span>
  }
</button>
