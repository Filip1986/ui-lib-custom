<!-- Backdrop — always in DOM, visibility toggled via CSS class -->
<div
  class="ui-lib-drawer__backdrop"
  [class.ui-lib-drawer__backdrop--visible]="modal() && visible()"
  aria-hidden="true"
  (click)="onBackdropClick()"
></div>

<!-- Panel — always in DOM so ng-content projection is preserved.
     aria-hidden is controlled by the host element; not duplicated here. -->
<div
  class="ui-lib-drawer__panel"
  [class.ui-lib-drawer__panel--open]="visible()"
  role="dialog"
  [attr.aria-modal]="visible() && modal() ? 'true' : null"
  [attr.aria-labelledby]="header() ? titleId() : null"
  [attr.aria-label]="header() ? null : i18n.translate('drawer.label')"
  [attr.aria-describedby]="ariaDescribedby() ?? null"
  tabindex="-1"
  (keydown.escape)="onEscapeKey()"
>
  @if (header() || showCloseButton()) {
    <div class="ui-lib-drawer__header">
      <!-- Legacy slot name (backward compatible) -->
      <ng-content select="[drawerHeader]" />
      <!-- Canonical uilib-* slot name (preferred) -->
      <ng-content select="[uilib-header]" />
      @if (header()) {
        <span class="ui-lib-drawer__title" [attr.id]="titleId()">{{ header() }}</span>
      }
      @if (showCloseButton()) {
        <button
          type="button"
          class="ui-lib-drawer__close"
          [attr.aria-label]="effectiveCloseAriaLabel()"
          (click)="close()"
        >
          <svg
            class="ui-lib-drawer__close-icon"
            viewBox="0 0 24 24"
            width="16"
            height="16"
            aria-hidden="true"
            focusable="false"
          >
            <path
              d="M6.4 5 5 6.4 10.6 12 5 17.6 6.4 19l5.6-5.6L17.6 19l1.4-1.4-5.6-5.6L19 6.4 17.6 5 12 10.6z"
              fill="currentColor"
            />
          </svg>
        </button>
      }
    </div>
  }

  <div class="ui-lib-drawer__content">
    <ng-content />
  </div>

  <div class="ui-lib-drawer__footer">
    <!-- Legacy slot name (backward compatible) -->
    <ng-content select="[drawerFooter]" />
    <!-- Canonical uilib-* slot name (preferred) -->
    <ng-content select="[uilib-footer]" />
  </div>
</div>
