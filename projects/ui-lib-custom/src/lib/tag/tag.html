@if (showIcon()) {
  <span aria-hidden="true" class="ui-lib-tag__icon" [class]="icon()!"></span>
}
@if (value()) {
  <span class="ui-lib-tag__value">{{ value() }}</span>
}
<ng-content />
@if (dismissible()) {
  <button
    class="ui-lib-tag__remove-button"
    type="button"
    [attr.aria-label]="removeAriaLabel()"
    (click)="onRemoveClick($event)"
  >
    <span aria-hidden="true" [class]="removeIcon()"></span>
  </button>
}
