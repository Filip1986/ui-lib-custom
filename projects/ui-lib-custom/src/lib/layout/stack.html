@switch (_renderTag()) {
  @case ('span') {
    <span
      class="ui-lib-stack__content"
      [attr.aria-label]="_resolvedAriaLabel()"
      [attr.role]="_resolvedRole()"
      [style.align-items]="align()"
      [style.flex-direction]="_flexDirection()"
      [style.flex-wrap]="_flexWrap()"
      [style.gap]="_gapValue()"
      [style.justify-content]="_justifyContent()"
    >
      <ng-content />
    </span>
  }
  @case ('ul') {

      class="ui-lib-stack__content"

      [style.justify-content]="_justifyContent()"
    >
      <ng-content />
    </nav>
  }
  @case ('section') {
    <section
      class="ui-lib-stack__content"
      [attr.aria-label]="_resolvedAriaLabel()"
      [attr.role]="_resolvedRole()"

  @case ('aside') {
    <aside
      class="ui-lib-stack__content"
      [attr.aria-label]="_resolvedAriaLabel()"
      [attr.role]="_resolvedRole()"
      [style.align-items]="align()"
      [style.flex-direction]="_flexDirection()"
      [style.flex-wrap]="_flexWrap()"
      [style.gap]="_gapValue()"
      [style.justify-content]="_justifyContent()"
    >
      <ng-content />
    </aside>
  }
  @default {
    <div
      class="ui-lib-stack__content"
      [attr.aria-label]="_resolvedAriaLabel()"
      [attr.role]="_resolvedRole()"
      [style.align-items]="align()"
