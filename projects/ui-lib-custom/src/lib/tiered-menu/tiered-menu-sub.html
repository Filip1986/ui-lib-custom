<ul
  class="ui-lib-tiered-menu__list"
  role="menu"
>
  @for (item of visibleItems(); track $index) {
    @if (item.separator) {
      <li
        class="ui-lib-tiered-menu__separator"
        role="separator"
        aria-hidden="true"
      ></li>
    } @else {
      <li
        [class]="getItemClasses(item, $index)"
        role="none"
        (mouseenter)="onItemMouseEnter($index, item)"
      >
        <a
          class="ui-lib-tiered-menu__link"
          role="menuitem"
          [attr.href]="item.url ? item.url : null"
          [attr.target]="item.url && item.target ? item.target : null"
          [attr.aria-disabled]="item.disabled ? 'true' : null"
          [attr.aria-haspopup]="item.items?.length ? 'menu' : null"
          [attr.aria-expanded]="item.items?.length ? (activeIndex() === $index ? 'true' : 'false') : null"
          [attr.tabindex]="item.disabled ? '-1' : '0'"
          (click)="onItemClick($event, item, $index)"
          (keydown)="onItemKeyDown($event, item, $index)"
        >
          @if (item.icon) {
            <span
              class="ui-lib-tiered-menu__item-icon {{ item.icon }}"
              aria-hidden="true"
            ></span>
          }
          @if (item.label) {
            <span class="ui-lib-tiered-menu__item-label">{{ item.label }}</span>
          }
          @if (item.items?.length) {
            <span class="ui-lib-tiered-menu__submenu-icon" aria-hidden="true">&#8250;</span>
          }
        </a>

        @if (item.items?.length && activeIndex() === $index) {
          <div class="ui-lib-tiered-menu__submenu-wrapper">
            <ui-lib-tiered-menu-sub
              [items]="item.items ?? []"
              [level]="level() + 1"
              (itemActivated)="onNestedItemActivated($event)"
            />
          </div>
        }
      </li>
    }
  }
</ul>
