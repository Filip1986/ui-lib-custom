<!-- Backdrop — always in DOM, visibility toggled via CSS class -->
<div
  class="ui-lib-bottom-sheet__backdrop"
  [class.ui-lib-bottom-sheet__backdrop--visible]="showBackdrop() && visible()"
  aria-hidden="true"
  (click)="onBackdropClick()"
></div>

<!-- Panel — always in DOM so ng-content projection is preserved -->
<div
  class="ui-lib-bottom-sheet__panel"
  [class.ui-lib-bottom-sheet__panel--open]="visible()"
  role="dialog"
  [attr.aria-modal]="visible() ? 'true' : null"
  [attr.aria-labelledby]="header() ? titleId : null"
  tabindex="-1"
  (keydown.escape)="onEscapeKey()"
>
  @if (header()) {
    <div class="ui-lib-bottom-sheet__header">
      <span class="ui-lib-bottom-sheet__title" [id]="titleId">{{ header() }}</span>
      @if (showCloseButton()) {
        <button
          type="button"
          class="ui-lib-bottom-sheet__close"
          [attr.aria-label]="resolvedCloseAriaLabel()"
          (click)="close()"
        >
          <svg
            class="ui-lib-bottom-sheet__close-icon"
            viewBox="0 0 24 24"
            width="16"
            height="16"
            aria-hidden="true"
            focusable="false"
          >
            <path
              d="M6.4 5 5 6.4 10.6 12 5 17.6 6.4 19l5.6-5.6L17.6 19l1.4-1.4-5.6-5.6L19 6.4 17.6 5 12 10.6z"
              fill="currentColor"
            />
          </svg>
        </button>
      }
    </div>
  }

  <div class="ui-lib-bottom-sheet__content">
    <ng-content />
  </div>

  <div class="ui-lib-bottom-sheet__footer">
    <ng-content select="[bottomSheetFooter],[uilib-footer]" />
  </div>
</div>
