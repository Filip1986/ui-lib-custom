<div class="ui-lib-block-ui__content" [attr.inert]="blocked() ? '' : null">
  <ng-content />
</div>
<div
  aria-live="polite"
  class="ui-lib-block-ui__mask"
  role="status"
  [attr.aria-hidden]="blocked() ? null : 'true'"
  [class.ui-lib-block-ui__mask--visible]="blocked()"
  [style.z-index]="maskZIndex()"
>
  <ng-content select="[blockTemplate]" />
</div>
