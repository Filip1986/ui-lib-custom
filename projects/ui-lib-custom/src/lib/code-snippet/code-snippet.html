<div
  [class]="rootClasses()"
  role="region"
  [attr.aria-label]="accessibleLabel()"
  [attr.aria-labelledby]="ariaLabelledBy()"
>
  <!-- Header: window chrome, tab bar, copy button -->
  <div class="ui-lib-code-snippet__header">
    @if (showWindowChrome()) {
      <div class="ui-lib-code-snippet__window-chrome" aria-hidden="true">
        <span class="ui-lib-code-snippet__dot ui-lib-code-snippet__dot--close"></span>
        <span class="ui-lib-code-snippet__dot ui-lib-code-snippet__dot--minimize"></span>
        <span class="ui-lib-code-snippet__dot ui-lib-code-snippet__dot--maximize"></span>
      </div>
    }

    <!-- Tab bar — interactive when multiple files are present -->
    <div
      class="ui-lib-code-snippet__tabs"
      [class.ui-lib-code-snippet__tabs--multi]="isMultiTab()"
      [attr.role]="isMultiTab() ? 'tablist' : null"
      [attr.aria-label]="isMultiTab() ? effectiveTabsAriaLabel() : null"
    >
      @for (file of effectiveFiles(); track file.filename; let index = $index) {
        <button
          type="button"
          class="ui-lib-code-snippet__tab"
          [class.ui-lib-code-snippet__tab--active]="activeTabIndex() === index"
          [attr.role]="isMultiTab() ? 'tab' : null"
          [attr.id]="isMultiTab() ? tabId(index) : null"
          [attr.aria-controls]="isMultiTab() ? panelId(index) : null"
          [attr.aria-selected]="isMultiTab() ? activeTabIndex() === index : null"
          [attr.tabindex]="isMultiTab() ? (activeTabIndex() === index ? 0 : -1) : null"
          (click)="selectTab(index)"
          (keydown)="onTabKeydown($event, index)"
        >
          @if (fileIcon(file.language) !== null) {
            <iconify-icon
              class="ui-lib-code-snippet__tab-icon"
              [attr.icon]="fileIcon(file.language)"
              aria-hidden="true"
            />
          }
          <span class="ui-lib-code-snippet__tab-label">{{ file.filename }}</span>
        </button>
      }
    </div>

    @if (showCopyButton()) {
      <button
        type="button"
        class="ui-lib-code-snippet__copy-btn"
        [attr.aria-label]="copyAriaLabel()"
        [attr.aria-pressed]="copied()"
        (click)="onCopy()"
      >
        @if (copied()) {
          <!-- Checkmark icon -->
          <svg
            class="ui-lib-code-snippet__copy-icon ui-lib-code-snippet__copy-icon--check"
            aria-hidden="true"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="20 6 9 17 4 12" />
          </svg>
        } @else {
          <!-- Copy icon -->
          <svg
            class="ui-lib-code-snippet__copy-icon"
            aria-hidden="true"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
          </svg>
        }
      </button>
    }

    <!-- Consumer-provided header actions (e.g. expand/fullscreen, language selector, run button). -->
    <!-- Projected children are placed directly into the flex header row. -->
    <ng-content select="[uilib-header-actions]" />
  </div>

  <!-- Body: optional line numbers + code — scoped to the active tab's content -->
  <!-- tabindex="0" makes the scrollable body keyboard-operable (axe
       scrollable-region-focusable / WCAG 2.1.1). The tabpanel branch is also
       focusable per the ARIA tabs pattern. -->
  <div
    class="ui-lib-code-snippet__body"
    [style.max-height]="maxHeight()"
    tabindex="0"
    [attr.role]="isMultiTab() ? 'tabpanel' : null"
    [attr.id]="isMultiTab() ? panelId(activeTabIndex()) : null"
    [attr.aria-labelledby]="isMultiTab() ? tabId(activeTabIndex()) : null"
  >
    @if (showLineNumbers()) {
      <div class="ui-lib-code-snippet__line-numbers" aria-hidden="true">
        @for (line of lines(); track $index) {
          <div class="ui-lib-code-snippet__line-number">{{ $index + 1 }}</div>
        }
      </div>
    }

    <div class="ui-lib-code-snippet__code-wrap">
      <pre
        class="ui-lib-code-snippet__pre"
        [attr.data-language]="activeFile().language"
      ><code class="ui-lib-code-snippet__code" [innerHTML]="highlightedCode()"></code></pre>
    </div>
  </div>

  <!-- Consumer-provided footer content (e.g. run output, attribution, annotations). -->
  <ng-content select="[uilib-footer]" />
</div>
