@if (showImage()) {
  <img aria-hidden="true" class="ui-lib-avatar__image" [alt]="resolvedImageAlt()" [src]="image()" />
} @else if (showLabel()) {
  <span aria-hidden="true" class="ui-lib-avatar__label">{{ label() }}</span>
} @else if (showIcon()) {
  <span aria-hidden="true" class="ui-lib-avatar__icon" [class]="icon()!"></span>
} @else if (fallbackTemplate(); as tpl) {
  <!-- Typed fallback slot — receives { size, shape, variant } context -->
  <ng-container [ngTemplateOutlet]="tpl" [ngTemplateOutletContext]="fallbackContext()" />
} @else {
  <!-- Plain content projection fallback -->
  <ng-content />
}
