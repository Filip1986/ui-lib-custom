@if (visible()) {
  <div aria-hidden="true" class="ui-lib-confirm-dialog__backdrop" (click)="onBackdropClick()"></div>

  <div
    aria-modal="true"
    role="alertdialog"
    tabindex="-1"
    [attr.aria-describedby]="messageId"
    [attr.aria-labelledby]="headerId"
    [class]="panelClasses()"
    (keydown)="onPanelKeydown($event)"
  >
    <div class="ui-lib-confirm-dialog__header">
      <span class="ui-lib-confirm-dialog__title" [id]="headerId">
        {{ resolvedHeader() }}
      </span>

      @if (resolvedClosable()) {
        <button
          class="ui-lib-confirm-dialog__close-btn"
          type="button"
          [attr.aria-label]="i18n.translate('confirm-dialog.close')"
          (click)="close()"
        >
          <svg
            aria-hidden="true"
            class="ui-lib-confirm-dialog__close-icon"
            focusable="false"
            height="16"
            viewBox="0 0 24 24"
            width="16"
          >
            <path
              d="M6.4 5 5 6.4 10.6 12 5 17.6 6.4 19l5.6-5.6L17.6 19l1.4-1.4-5.6-5.6L19 6.4 17.6 5 12 10.6z"
              fill="currentColor"
            />
          </svg>
        </button>
      }
    </div>

    <div class="ui-lib-confirm-dialog__content" [id]="messageId">
      @if (resolvedIcon()) {
        <i aria-hidden="true" class="ui-lib-confirm-dialog__icon" [class]="resolvedIcon()"></i>
      }
      <p class="ui-lib-confirm-dialog__message">{{ resolvedMessage() }}</p>

      <!-- Consumer-provided rich content rendered below the message. -->
      <!-- Set message="" to suppress the default message paragraph. -->
      <ng-content select="[uilib-content]" />
    </div>

    <div class="ui-lib-confirm-dialog__footer">
      @if (!resolvedAcceptOnly()) {
        <button type="button" [class]="rejectBtnClasses()" (click)="handleReject()">
          @if (resolvedRejectIcon()) {
            <i aria-hidden="true" [class]="resolvedRejectIcon()"></i>
          }
          {{ resolvedRejectLabel() }}
        </button>
      }

      <button type="button" [class]="acceptBtnClasses()" (click)="handleAccept()">
        @if (resolvedAcceptIcon()) {
          <i aria-hidden="true" [class]="resolvedAcceptIcon()"></i>
        }
        {{ resolvedAcceptLabel() }}
      </button>
    </div>
  </div>
}
