<input
  #inputEl
  [attr.aria-describedby]="ariaDescribedBy()"
  [attr.aria-invalid]="isInvalid() ? 'true' : null"
  [attr.aria-label]="
    ariaLabel() || (ariaLabelledBy() ? null : i18n.translate('input-mask.input.label'))
  "
  [attr.aria-labelledby]="ariaLabelledBy() || null"
  [attr.autocomplete]="autocomplete()"
  [attr.name]="name()"
  [attr.placeholder]="placeholder() ?? null"
  [class.uilib-filled]="filled()"
  [class.uilib-input-lg]="size() === 'lg'"
  [class.uilib-input-sm]="size() === 'sm'"
  [disabled]="isControlDisabled()"
  [id]="controlId()"
  [readonly]="readonly()"
  [type]="type()"
  (blur)="onBlur($event)"
  (focus)="onFocus($event)"
  (input)="onInputChange($event)"
  (keydown)="onKeyDown($event)"
  (keypress)="onKeyPress($event)"
  (paste)="onPaste($event)"
/>
@if (showClear() && isFilled() && !isControlDisabled()) {
  <button
    class="ui-lib-input-mask-clear-icon"
    type="button"
    [attr.aria-label]="i18n.translate('input-mask.clear')"
    (click)="clear()"
  >
    ×
  </button>
}
@if (maskFormatHint()) {
  <span class="ui-lib-input-mask-sr-only" [id]="hintId()">Format: {{ maskFormatHint() }}</span>
}
@if (showError()) {
  <div aria-live="assertive" class="ui-lib-input-mask-error" role="alert" [id]="errorId()">
    <ng-content select="[error]">{{ resolvedErrorMessage() }}</ng-content>
  </div>
}
@if (blockedCharacterMessage()) {
  <span aria-atomic="true" aria-live="polite" class="ui-lib-input-mask-sr-only">
    {{ blockedCharacterMessage() }}
  </span>
}
