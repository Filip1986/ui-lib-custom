<div class="ui-lib-textarea__wrapper">
  @if (label()) {
    <label class="ui-lib-textarea__label" [attr.for]="controlId()">
      {{ label() }}
      @if (required()) {
        <span class="ui-lib-textarea__required" aria-hidden="true">*</span>
      }
    </label>
  }

  <div class="ui-lib-textarea__field">
    <textarea
      #textareaRef
      class="ui-lib-textarea__control"
      [id]="controlId()"
      [name]="name() ?? controlId()"
      [placeholder]="placeholder()"
      [rows]="rows()"
      [attr.cols]="cols() ?? null"
      [attr.maxlength]="maxLength() ?? null"
      [attr.aria-label]="ariaLabel() || null"
      [attr.aria-labelledby]="ariaLabelledBy() || null"
      [attr.aria-invalid]="isInvalid() ? 'true' : null"
      [attr.aria-required]="required() ? 'true' : null"
      [attr.aria-describedby]="ariaDescribedBy()"
      [attr.aria-readonly]="readonly() ? 'true' : null"
      [attr.aria-disabled]="isDisabled() ? 'true' : null"
      [disabled]="isDisabled()"
      [attr.readonly]="readonly() ? '' : null"
      [required]="required() || null"
      [style.resize]="nativeResize()"
      [value]="value()"
      (input)="handleInput($event)"
      (focus)="handleFocus($event)"
      (blur)="handleBlur($event)"
    ></textarea>
  </div>

  <div class="ui-lib-textarea__meta">
    <div class="ui-lib-textarea__messages">
      <div
        class="ui-lib-textarea__hint"
        [id]="hintId()"
        [class.ui-lib-textarea__message--hidden]="!showHintRegion()"
      >
        @if (hint() && !hasProjectedHint()) {
          {{ hint() }}
        }
        <ng-content select="[textareaHint]" />
      </div>

      <div
        class="ui-lib-textarea__error"
        [id]="errorId()"
        [attr.role]="showErrorRegion() ? 'alert' : null"
        [class.ui-lib-textarea__message--hidden]="!showErrorRegion()"
      >
        @if (error() && !hasProjectedError()) {
          {{ error() }}
        }
        <ng-content select="[textareaError]" />
      </div>
    </div>

    @if (showCounter()) {
      <span class="ui-lib-textarea__counter">
        @if (maxLength()) {
          {{ currentLength() }} / {{ maxLength() }}
        } @else {
          {{ currentLength() }}
        }
      </span>
    }
  </div>
</div>
