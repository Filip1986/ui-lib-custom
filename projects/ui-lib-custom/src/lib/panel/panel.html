<div
  class="ui-lib-panel__header"
  [class.ui-lib-panel__header--hidden]="!showHeader()"
  [id]="headerId"
>
  <span #projectedHeaderSlot style="display: contents"><ng-content select="[panelHeader]" /></span>
  @if (header()) {
    <span class="ui-lib-panel__title">{{ header() }}</span>
  }
  <div class="ui-lib-panel__header-actions">
    <span #projectedIconsSlot style="display: contents"><ng-content select="[panelIcons]" /></span>
    @if (toggleable()) {
      <button
        class="ui-lib-panel__toggle-button"
        type="button"
        [attr.aria-controls]="contentId"
        [attr.aria-expanded]="!collapsed()"
        [attr.aria-label]="i18n.translate('panel.toggle')"
        (click)="handleToggleClick($event)"
        (keydown.enter)="handleToggleKeydown($event)"
        (keydown.space)="handleToggleKeydown($event)"
      >
        <span
          aria-hidden="true"
          class="ui-lib-panel__toggle-icon"
          [class.ui-lib-panel__toggle-icon--collapsed]="collapsed()"
        ></span>
      </button>
    }
  </div>
</div>
<div
  class="ui-lib-panel__content-wrapper"
  [attr.aria-hidden]="toggleable() && collapsed() ? 'true' : null"
  [class.ui-lib-panel__content-wrapper--collapsed]="toggleable() && collapsed()"
  [id]="contentId"
>
  <div class="ui-lib-panel__content-inner">
    <ng-content />
  </div>
</div>
<div class="ui-lib-panel__footer">
  <ng-content select="[panelFooter]" />
</div>
