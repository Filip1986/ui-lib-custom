<span
  class="ui-lib-skeleton__content"
  [class.ui-lib-skeleton__content--hidden]="loading()"
  [attr.aria-hidden]="loading() ? 'true' : null"
  [attr.inert]="loading() ? '' : null"
>
  <ng-content />
</span>

@if (loading()) {
  <span class="ui-lib-skeleton__placeholder" aria-hidden="true">
    <span class="ui-lib-skeleton__shimmer" aria-hidden="true"></span>
  </span>
}
