<span
  class="ui-lib-skeleton__content"
  [attr.aria-hidden]="loading() ? 'true' : null"
  [attr.inert]="loading() ? '' : null"
  [class.ui-lib-skeleton__content--hidden]="loading()"
>
  <ng-content />
</span>

@if (loading()) {
  <span aria-hidden="true" class="ui-lib-skeleton__placeholder">
    <span aria-hidden="true" class="ui-lib-skeleton__shimmer"></span>
  </span>
}
