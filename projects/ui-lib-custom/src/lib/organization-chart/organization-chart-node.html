<div
  class="uilib-org-chart-node-cell"
  role="treeitem"
  [attr.aria-disabled]="node().selectable === false || null"
  [attr.aria-expanded]="hasChildren() ? isExpanded() : null"
  [attr.aria-level]="depth() + 1"
  [attr.aria-posinset]="posinset()"
  [attr.aria-selected]="ctx.selectionMode() ? isSelected() : null"
  [attr.aria-setsize]="setsize()"
  [class]="node().styleClass ?? ''"
  [class.uilib-org-chart-node-cell--selectable]="isSelectable()"
  [class.uilib-org-chart-node-cell--selected]="isSelected()"
  [tabindex]="tabIndex()"
  (click)="onNodeClick($event)"
  (keydown.enter)="onNodeKeydown($event)"
  (keydown.space)="onNodeKeydown($event)"
>
  @if (resolvedTemplate(); as template) {
    <ng-container *ngTemplateOutlet="template; context: nodeContext()" />
  } @else {
    <span class="uilib-org-chart-node-label">{{ node().label }}</span>
  }

  @if (ctx.collapsible() && hasChildren()) {
    <button
      class="uilib-org-chart-toggle-btn"
      type="button"
      [attr.aria-label]="
        isExpanded()
          ? i18n.translate('organization-chart.collapse')
          : i18n.translate('organization-chart.expand')
      "
      (click)="onToggleClick($event)"
      (keydown.enter)="onToggleKeydown($event)"
      (keydown.space)="onToggleKeydown($event)"
    >
      <span
        aria-hidden="true"
        class="uilib-org-chart-toggle-icon"
        [class.uilib-org-chart-toggle-icon--expanded]="isExpanded()"
      >
        ▾
      </span>
    </button>
  }
</div>

@if (hasChildren() && isExpanded()) {
  <div aria-hidden="true" class="uilib-org-chart-connector-down"></div>
  <ul class="uilib-org-chart-children-row" role="group">
    @for (child of node().children; track child.key; let isFirst = $first; let isLast = $last) {
      <li
        class="uilib-org-chart-child-col"
        role="none"
        [class.uilib-org-chart-child-col--first]="isFirst"
        [class.uilib-org-chart-child-col--last]="isLast"
        [class.uilib-org-chart-child-col--only]="node().children!.length === 1"
      >
        <div aria-hidden="true" class="uilib-org-chart-connector-up"></div>
        <ui-lib-organization-chart-node
          [depth]="depth() + 1"
          [node]="child"
          [posinset]="$index + 1"
          [setsize]="node().children!.length"
        />
      </li>
    }
  </ul>
}
