@if (!inline()) {
  <button
    #triggerButton
    aria-haspopup="dialog"
    class="ui-lib-colorpicker__trigger"
    type="button"
    [attr.aria-controls]="panelVisible() ? panelId() : null"
    [attr.aria-expanded]="panelVisible() ? 'true' : 'false'"
    [attr.aria-label]="resolvedTriggerAriaLabel()"
    [attr.aria-labelledby]="ariaLabelledBy()"
    [attr.id]="triggerId()"
    [attr.tabindex]="tabindex()"
    [disabled]="isDisabled()"
    [style.background-color]="displayColor()"
    (click)="onTriggerClick($event)"
    (keydown)="onTriggerKeydown($event)"
  ></button>
}

<input type="hidden" [disabled]="isDisabled()" [id]="resolvedInputId()" [value]="displayColor()" />

@defer (on immediate) {
  @if (inline() || panelVisible()) {
    <div
      #panelElement
      aria-modal="false"
      class="ui-lib-colorpicker__panel"
      role="dialog"
      [attr.aria-label]="i18n.translate('colorpicker.panel')"
      [attr.data-placement]="panelPlacement()"
      [attr.id]="panelId()"
      [attr.tabindex]="isDisabled() ? -1 : 0"
      (click)="$event.stopPropagation()"
      (keydown)="onPanelKeydown($event)"
    >
      <div class="ui-lib-colorpicker__controls">
        <div
          #colorAreaElement
          aria-hidden="true"
          class="ui-lib-colorpicker__color-area"
          tabindex="-1"
          [style.background-color]="hueOnlyColor()"
          (keydown)="onColorAreaKeydown($event)"
          (mousedown)="onColorAreaMouseDown($event)"
          (touchstart)="onColorAreaTouchStart($event)"
        >
          <div class="ui-lib-colorpicker__color-area-gradient"></div>
          <div
            class="ui-lib-colorpicker__selector"
            [style.left.%]="selectorLeft()"
            [style.top.%]="selectorTop()"
          ></div>
        </div>

        <div
          #hueElement
          aria-valuemax="359"
          aria-valuemin="0"
          class="ui-lib-colorpicker__hue"
          role="slider"
          [attr.aria-label]="i18n.translate('colorpicker.hue')"
          [attr.aria-valuenow]="hue()"
          [attr.aria-valuetext]="hue() + ' degrees'"
          [attr.tabindex]="isDisabled() ? -1 : 0"
          (keydown)="onHueKeydown($event)"
          (mousedown)="onHueMouseDown($event)"
          (touchstart)="onHueTouchStart($event)"
        >
          <div class="ui-lib-colorpicker__hue-handle" [style.top.%]="hueHandleTop()"></div>
        </div>
      </div>

      <div class="ui-lib-colorpicker__inputs">
        <div class="ui-lib-colorpicker__input-group ui-lib-colorpicker__input-group--hex">
          <label class="ui-lib-colorpicker__input-label" [attr.for]="hexInputId()">{{
            i18n.translate('colorpicker.label.hex')
          }}</label>
          <input
            class="ui-lib-colorpicker__text-input"
            type="text"
            [attr.id]="hexInputId()"
            [disabled]="isDisabled()"
            [value]="hexDisplayValue()"
            (change)="onHexInputChange($event)"
          />
        </div>
        <div class="ui-lib-colorpicker__input-row">
          <div class="ui-lib-colorpicker__input-group">
            <label class="ui-lib-colorpicker__input-label" [attr.for]="hueInputId()">{{
              i18n.translate('colorpicker.label.h')
            }}</label>
            <input
              class="ui-lib-colorpicker__number-input"
              max="359"
              min="0"
              type="number"
              [attr.id]="hueInputId()"
              [disabled]="isDisabled()"
              [value]="hue()"
              (change)="onHueInputChange($event)"
            />
          </div>
          <div class="ui-lib-colorpicker__input-group">
            <label class="ui-lib-colorpicker__input-label" [attr.for]="satInputId()">{{
              i18n.translate('colorpicker.label.s')
            }}</label>
            <input
              class="ui-lib-colorpicker__number-input"
              max="100"
              min="0"
              type="number"
              [attr.id]="satInputId()"
              [disabled]="isDisabled()"
              [value]="saturation()"
              (change)="onSatInputChange($event)"
            />
          </div>
          <div class="ui-lib-colorpicker__input-group">
            <label class="ui-lib-colorpicker__input-label" [attr.for]="brightInputId()">{{
              i18n.translate('colorpicker.label.b')
            }}</label>
            <input
              class="ui-lib-colorpicker__number-input"
              max="100"
              min="0"
              type="number"
              [attr.id]="brightInputId()"
              [disabled]="isDisabled()"
              [value]="brightness()"
              (change)="onBrightInputChange($event)"
            />
          </div>
        </div>
      </div>
    </div>
  }
}
