<div
  class="ui-lib-progress-bar__fill"
  [style.width]="mode() === 'determinate' ? clampedValue() + '%' : null"
  [style.background-color]="color()"
>
  @if (mode() === 'determinate' && showValue()) {
    <span class="ui-lib-progress-bar__label">{{ displayLabel() }}</span>
  }
</div>
@if (clampedValue() === 100) {
  <span aria-live="polite" aria-atomic="true" class="ui-lib-progress-bar__sr-only">
    {{ completionLabel() !== null ? completionLabel() : i18n.translate('progressbar.complete') }}
  </span>
}
