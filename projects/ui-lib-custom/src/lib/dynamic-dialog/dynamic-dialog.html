@if (resolvedModal()) {
  <div class="ui-lib-dynamic-dialog__backdrop" (click)="onBackdropClick()"></div>
}

<div
  [class]="panelClasses()"
  [style.width]="resolvedWidth()"
  [style.height]="resolvedHeight()"
  role="dialog"
  [attr.aria-modal]="resolvedModal() ? 'true' : null"
  tabindex="-1"
  [attr.aria-labelledby]="resolvedHeader() ? headerId : null"
  [attr.aria-label]="resolvedAriaLabel()"
  [attr.aria-describedby]="resolvedAriaDescribedby()"
  (keydown)="onPanelKeydown($event)"
>
  @if (showHeader()) {
    <div class="ui-lib-dynamic-dialog__header">
      @if (resolvedHeader()) {
        <span class="ui-lib-dynamic-dialog__title" [id]="headerId">
          {{ resolvedHeader() }}
        </span>
      }

      @if (resolvedClosable()) {
        <button
          type="button"
          class="ui-lib-dynamic-dialog__close-btn"
          aria-label="Close"
          (click)="close()"
        >
          <svg
            class="ui-lib-dynamic-dialog__close-icon"
            viewBox="0 0 24 24"
            width="16"
            height="16"
            aria-hidden="true"
            focusable="false"
          >
            <path
              d="M6.4 5 5 6.4 10.6 12 5 17.6 6.4 19l5.6-5.6L17.6 19l1.4-1.4-5.6-5.6L19 6.4 17.6 5 12 10.6z"
              fill="currentColor"
            />
          </svg>
        </button>
      }
    </div>
  }

  <div class="ui-lib-dynamic-dialog__content">
    <ng-container #dynamicContent></ng-container>
  </div>
</div>
