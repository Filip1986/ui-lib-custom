@if (visible()) {
  <!-- Transparent overlay catches click-away to dismiss -->
  <div
    class="ui-lib-popover__overlay"
    aria-hidden="true"
    [class.ui-lib-popover__overlay--active]="dismissable()"
    (click)="onOverlayClick()"
  ></div>

  <!-- Floating panel anchored near the target element -->
  <div
    [id]="panelId"
    [class]="panelClasses()"
    [style.top.px]="panelTop()"
    [style.left.px]="panelLeft()"
    role="dialog"
    aria-modal="false"
    tabindex="-1"
    [attr.aria-labelledby]="header() ? titleId : null"
    [attr.aria-label]="header() ? null : i18n.translate('popover.label')"
    (keydown)="onPanelKeydown($event)"
  >
    <!-- Arrow pointing toward the trigger element -->
    <div
      class="ui-lib-popover__arrow"
      [style.left.px]="arrowLeftOffset()"
      aria-hidden="true"
    ></div>

    @if (header() || showCloseButton()) {
      <div class="ui-lib-popover__header">
        @if (header()) {
          <span class="ui-lib-popover__title" [id]="titleId">{{ header() }}</span>
        }
        @if (showCloseButton()) {
          <button
            type="button"
            class="ui-lib-popover__close-btn"
            [attr.aria-label]="i18n.translate('popover.close')"
            (click)="hide()"
          >
            <svg
              aria-hidden="true"
              focusable="false"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              width="14"
              height="14"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        }
      </div>
    }

    <div class="ui-lib-popover__content">
      <ng-content />
    </div>
  </div>
}
