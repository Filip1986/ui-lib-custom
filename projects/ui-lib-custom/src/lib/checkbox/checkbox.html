<div class="ui-lib-checkbox__box" aria-hidden="true">
  <span class="ui-lib-checkbox__icon ui-lib-checkbox__icon--check"></span>
  <span class="ui-lib-checkbox__icon ui-lib-checkbox__icon--indeterminate"></span>
</div>
<div class="ui-lib-checkbox__content">
  <span class="ui-lib-checkbox__label" [id]="labelElementId">
    @if (label()) {
      {{ label() }}
    }
    <ng-content />
  </span>
  @if (showDescription()) {
    <span class="ui-lib-checkbox__description" [id]="descriptionElementId">
      {{ description() }}
    </span>
  }
</div>
