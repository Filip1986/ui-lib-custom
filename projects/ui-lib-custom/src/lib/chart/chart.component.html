<div class="ui-lib-chart__container">
  <canvas
    #chartCanvas
    role="img"
    [attr.aria-describedby]="showDataTable() ? tableId : null"
    [attr.aria-label]="effectiveAriaLabel()"
  ></canvas>
</div>

@if (showDataTable() && data()) {
  <table class="ui-lib-chart__sr-table" [id]="tableId">
    <caption>
      {{
        effectiveAriaLabel()
      }}
    </caption>
    <thead>
      <tr>
        <th scope="col">Dataset</th>
        @for (label of tableLabels(); track label) {
          <th scope="col">{{ label }}</th>
        }
      </tr>
    </thead>
    <tbody>
      @for (row of datasetRows(); track row.label) {
        <tr>
          <th scope="row">{{ row.label }}</th>
          @for (value of row.values; track $index) {
            <td>{{ value }}</td>
          }
        </tr>
      }
    </tbody>
  </table>
}
