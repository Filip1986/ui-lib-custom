<div
  class="uilib-password-input-wrapper"
  [class.uilib-password-has-toggle]="toggleMask()"
  [class.uilib-password-has-clear]="showClear() && isFilled() && !isControlDisabled()"
>
  <input
    class="uilib-password-input"
    [class]="inputStyleClass()"
    [id]="inputId() ?? null"
    [type]="inputType()"
    [disabled]="isControlDisabled() || null"
    [readonly]="readonly() || null"
    [placeholder]="placeholder() ?? ''"
    [attr.name]="name()"
    [attr.autocomplete]="autocomplete()"
    [attr.aria-label]="ariaLabel()"
    [attr.aria-labelledby]="ariaLabelledBy()"
    [attr.maxlength]="maxLength()"
    [attr.tabindex]="tabindex()"
    [value]="inputValue()"
    (input)="onInput($event)"
    (focus)="onFocus($event)"
    (blur)="onBlur($event)"
  />

  @if (toggleMask()) {
    <button
      type="button"
      class="uilib-password-toggle-btn"
      [attr.aria-label]="passwordVisible() ? 'Hide password' : 'Show password'"
      [disabled]="isControlDisabled() || null"
      (click)="togglePasswordVisibility()"
      tabindex="-1"
    >
      @if (passwordVisible()) {
        <!-- Eye-slash icon: password is visible, click to hide -->
        <svg
          class="uilib-password-icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path
            d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
          />
          <line x1="1" y1="1" x2="23" y2="23" />
        </svg>
      } @else {
        <!-- Eye icon: password is hidden, click to reveal -->
        <svg
          class="uilib-password-icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
      }
    </button>
  }

  @if (showClear() && isFilled() && !isControlDisabled()) {
    <button
      type="button"
      class="uilib-password-clear-btn"
      aria-label="Clear password"
      (click)="clear()"
      tabindex="-1"
    >
      <!-- X / close icon -->
      <svg
        class="uilib-password-icon"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
  }
</div>

@if (feedback() && overlayVisible()) {
  <div
    class="uilib-password-panel"
    role="status"
    aria-live="polite"
    aria-atomic="true"
  >
    <div class="uilib-password-meter" aria-hidden="true">
      <div
        class="uilib-password-meter-fill"
        [class.uilib-password-meter-weak]="strength() === 'weak'"
        [class.uilib-password-meter-medium]="strength() === 'medium'"
        [class.uilib-password-meter-strong]="strength() === 'strong'"
        [style.width]="meterWidth()"
      ></div>
    </div>
    <div class="uilib-password-meter-text">{{ strengthLabel() }}</div>
  </div>
}
