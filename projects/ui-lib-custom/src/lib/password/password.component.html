<div
  class="ui-lib-password-input-wrapper"
  [class.ui-lib-password-has-clear]="showClear() && isFilled() && !isControlDisabled()"
  [class.ui-lib-password-has-toggle]="toggleMask()"
>
  <input
    class="ui-lib-password-input"
    [attr.aria-describedby]="ariaDescribedBy()"
    [attr.aria-invalid]="invalid() ? 'true' : null"
    [attr.aria-label]="ariaLabel()"
    [attr.aria-labelledby]="ariaLabelledBy()"
    [attr.autocomplete]="autocomplete()"
    [attr.maxlength]="maxLength()"
    [attr.name]="name()"
    [attr.tabindex]="tabindex()"
    [class]="inputStyleClass()"
    [disabled]="isControlDisabled() || null"
    [id]="inputId() ?? passwordId"
    [placeholder]="placeholder() ?? ''"
    [readonly]="readonly() || null"
    [type]="inputType()"
    [value]="inputValue()"
    (blur)="onBlur($event)"
    (focus)="onFocus($event)"
    (input)="onInput($event)"
  />

  @if (toggleMask()) {
    <button
      class="ui-lib-password-toggle-btn"
      tabindex="-1"
      type="button"
      [attr.aria-label]="
        passwordVisible() ? i18n.translate('password.hide') : i18n.translate('password.show')
      "
      [attr.aria-pressed]="passwordVisible()"
      [disabled]="isControlDisabled() || null"
      (click)="togglePasswordVisibility()"
    >
      @if (passwordVisible()) {
        <!-- Eye-slash icon: password is visible, click to hide -->
        <svg
          aria-hidden="true"
          class="ui-lib-password-icon"
          fill="none"
          focusable="false"
          stroke="currentColor"
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <path
            d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
          />
          <line x1="1" x2="23" y1="1" y2="23" />
        </svg>
      } @else {
        <!-- Eye icon: password is hidden, click to reveal -->
        <svg
          aria-hidden="true"
          class="ui-lib-password-icon"
          fill="none"
          focusable="false"
          stroke="currentColor"
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
      }
    </button>
  }

  @if (showClear() && isFilled() && !isControlDisabled()) {
    <button
      class="ui-lib-password-clear-btn"
      tabindex="-1"
      type="button"
      [attr.aria-label]="i18n.translate('password.clear')"
      (click)="clear()"
    >
      <!-- X / close icon -->
      <svg
        aria-hidden="true"
        class="ui-lib-password-icon"
        fill="none"
        focusable="false"
        stroke="currentColor"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <line x1="18" x2="6" y1="6" y2="18" />
        <line x1="6" x2="18" y1="6" y2="18" />
      </svg>
    </button>
  }
</div>

@if (feedback()) {
  <!-- Visually-hidden live region — always in the DOM when feedback is enabled so that
       strength changes are announced to assistive technology without needing the visual
       panel to be visible. -->
  <div
    aria-atomic="true"
    aria-live="polite"
    class="uilib-visually-hidden"
    role="status"
    [attr.id]="strengthId"
  >
    {{ strengthDescription() }}
  </div>
}

@if (invalid() && errorMessage()) {
  <div class="ui-lib-password-error" [attr.id]="errorId">{{ errorMessage() }}</div>
}

@if (feedback() && overlayVisible()) {
  <div class="ui-lib-password-panel">
    <div aria-hidden="true" class="ui-lib-password-meter">
      <div
        class="ui-lib-password-meter-fill"
        [class.ui-lib-password-meter-medium]="strength() === 'medium'"
        [class.ui-lib-password-meter-strong]="strength() === 'strong'"
        [class.ui-lib-password-meter-weak]="strength() === 'weak'"
        [style.width]="meterWidth()"
      ></div>
    </div>
    <div aria-hidden="true" class="ui-lib-password-meter-text">{{ strengthLabel() }}</div>
  </div>
}
