<div
  class="ui-lib-fieldset__legend"
  [attr.aria-controls]="toggleable() ? contentId : null"
  [attr.aria-expanded]="toggleable() ? !collapsed() : null"
  [attr.role]="toggleable() ? 'button' : null"
  [attr.tabindex]="toggleable() ? 0 : null"
  [class.ui-lib-fieldset__legend--toggleable]="toggleable()"
  [id]="legendId"
  (click)="handleClick()"
  (keydown.enter)="handleKeydown($event)"
  (keydown.space)="handleKeydown($event)"
>
  @if (toggleable()) {
    <span
      aria-hidden="true"
      class="ui-lib-fieldset__toggle-icon"
      [class.ui-lib-fieldset__toggle-icon--collapsed]="collapsed()"
    ></span>
  }
  <ng-content select="[fieldsetLegend]" />
  @if (legend()) {
    <span class="ui-lib-fieldset__legend-text">{{ legend() }}</span>
  }
</div>
<div
  class="ui-lib-fieldset__content-wrapper"
  [attr.aria-hidden]="toggleable() && collapsed() ? 'true' : null"
  [class.ui-lib-fieldset__content-wrapper--collapsed]="toggleable() && collapsed()"
  [id]="contentId"
>
  <div class="ui-lib-fieldset__content-inner">
    <ng-content />
  </div>
</div>
