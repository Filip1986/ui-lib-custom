@if (visible() && modal()) {
  <div
    class="ui-lib-dialog-backdrop"
    tabindex="-1"
    (click)="onBackdropClick()"
    (keydown.escape)="onBackdropClick()"
  ></div>
}

@if (visible()) {
  @if (headless()) {
    <ng-content select="[uiLibDialogHeadless]" />
  } @else {
    <div
      #panelElement
      class="ui-lib-dialog-panel"
      role="dialog"
      tabindex="-1"
      [attr.aria-describedby]="ariaDescribedBy() ?? null"
      [attr.aria-labelledby]="labelledById()"
      [attr.aria-modal]="modal() || null"
      [class]="panelClasses()"
      [ngStyle]="panelStyles()"
      (keydown)="onPanelKeydown($event)"
    >
      <div class="ui-lib-dialog-header" (pointerdown)="onHeaderPointerDown($event)">
        <span class="ui-lib-dialog-title" [id]="titleId()">
          <ng-content select="[uiLibDialogHeader]" />
          @if (!hasHeaderContent()) {
            {{ header() }}
          }
        </span>

        <div class="ui-lib-dialog-header-actions">
          @if (maximizable()) {
            <button
              class="ui-lib-dialog-maximize-btn"
              type="button"
              [attr.aria-label]="
                maximized() ? i18n.translate('dialog.minimize') : i18n.translate('dialog.maximize')
              "
              (click)="toggleMaximize()"
            >
              @if (maximized()) {
                <svg
                  aria-hidden="true"
                  class="ui-lib-dialog-action-icon"
                  focusable="false"
                  height="16"
                  viewBox="0 0 24 24"
                  width="16"
                >
                  <path d="M5 8h14v2H5z" fill="currentColor" />
                </svg>
              } @else {
                <svg
                  aria-hidden="true"
                  class="ui-lib-dialog-action-icon"
                  focusable="false"
                  height="16"
                  viewBox="0 0 24 24"
                  width="16"
                >
                  <path d="M11 5h2v14h-2zM5 11h14v2H5z" fill="currentColor" />
                </svg>
              }
            </button>
          }

          @if (closable()) {
            <button
              class="ui-lib-dialog-close-btn"
              type="button"
              [attr.aria-label]="i18n.translate('dialog.close')"
              (click)="close()"
            >
              <svg
                aria-hidden="true"
                class="ui-lib-dialog-action-icon"
                focusable="false"
                height="16"
                viewBox="0 0 24 24"
                width="16"
              >
                <path
                  d="M6.4 5 5 6.4 10.6 12 5 17.6 6.4 19l5.6-5.6L17.6 19l1.4-1.4-5.6-5.6L19 6.4 17.6 5 12 10.6z"
                  fill="currentColor"
                />
              </svg>
            </button>
          }
        </div>
      </div>

      <div class="ui-lib-dialog-content">
        <ng-content />
      </div>

      <div class="ui-lib-dialog-footer">
        <ng-content select="[uiLibDialogFooter]" />
      </div>
    </div>
  }
}
