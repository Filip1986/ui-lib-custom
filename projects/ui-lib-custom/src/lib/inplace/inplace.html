<!-- Display button: always in DOM, hidden via CSS class when active -->
<button
  type="button"
  class="ui-lib-inplace__display"
  [class.ui-lib-inplace__display--hidden]="active()"
  [id]="displayId"
  [disabled]="disabled()"
  [attr.aria-expanded]="active()"
  [attr.aria-controls]="contentId"
  [attr.aria-label]="effectiveDisplayLabel()"
  (click)="onDisplayClick()"
  (keydown)="onDisplayKeydown($event)"
>
  <ng-content select="[inplaceDisplay]" />
</button>

<!-- Content slot: always in DOM, hidden via CSS class when inactive -->
<div
  class="ui-lib-inplace__content"
  [id]="contentId"
  [class.ui-lib-inplace__content--hidden]="!active()"
  [attr.aria-hidden]="!active() || null"
  (keydown)="onContentKeydown($event)"
>
  <ng-content select="[inplaceContent]" />
  @if (closable()) {
    <button
      type="button"
      class="ui-lib-inplace__close-button"
      [attr.aria-label]="effectiveCloseLabel()"
      (click)="deactivate()"
    >
      <span [class]="closeIcon()" aria-hidden="true"></span>
    </button>
  }
</div>
