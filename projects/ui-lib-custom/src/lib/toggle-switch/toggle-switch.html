<input
  class="ui-lib-toggle-switch__native-input"
  role="switch"
  type="checkbox"
  [attr.aria-checked]="ariaChecked()"
  [attr.aria-label]="ariaLabel()"
  [attr.aria-labelledby]="ariaLabelledby()"
  [attr.aria-readonly]="readonly() || null"
  [attr.tabindex]="effectiveTabindex()"
  [checked]="checked()"
  [disabled]="isDisabled()"
  [id]="nativeInputId()"
  [name]="name()"
  [readOnly]="readonly()"
  (blur)="onNativeBlur($event)"
  (change)="onNativeChange($event)"
  (click)="onToggle($event)"
  (focus)="onFocusIn($event)"
  (keydown)="onKeyDown($event)"
/>
<span aria-hidden="true" class="ui-lib-toggle-switch__track">
  <span class="ui-lib-toggle-switch__thumb"></span>
</span>
@if (label()) {
  <label class="ui-lib-toggle-switch__label" [for]="nativeInputId()" [id]="labelElementId">
    {{ label() }}
  </label>
}
@if (!label()) {
  <ng-content />
}
