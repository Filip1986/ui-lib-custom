<input
  class="ui-lib-toggle-switch__native-input"
  type="checkbox"
  role="switch"
  [id]="nativeInputId()"
  [name]="name()"
  [checked]="checked()"
  [disabled]="isDisabled()"
  [readOnly]="readonly()"
  [attr.tabindex]="effectiveTabindex()"
  [attr.aria-label]="ariaLabel()"
  [attr.aria-labelledby]="ariaLabelledby()"
  [attr.aria-checked]="ariaChecked()"
  (click)="onToggle($event)"
  (change)="onNativeChange($event)"
  (keydown)="onKeyDown($event)"
  (focus)="onFocusIn($event)"
  (blur)="onNativeBlur($event)"
/>
<span class="ui-lib-toggle-switch__track" aria-hidden="true">
  <span class="ui-lib-toggle-switch__thumb"></span>
</span>
@if (label()) {
  <label
    class="ui-lib-toggle-switch__label"
    [id]="labelElementId"
    [for]="nativeInputId()"
  >
    {{ label() }}
  </label>
}
@if (!label()) {
  <ng-content />
}
